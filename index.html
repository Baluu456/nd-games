<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ND Games">
<meta name="theme-color" content="#0f0f13">
<link rel="manifest" id="manifest-ph">
<title>ND Games</title>
<style>
:root{--bg:#0f0f13;--bg2:#17171e;--bg3:#1e1e28;--bg4:#25252f;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);--text:#f0f0f5;--text2:#9090a8;--text3:#5a5a72;--accent:#7c6df0;--accent2:#5a4dd4;--green:#3ecf8e;--red:#f06060;--amber:#f0a832;--blue:#4da8f0;--radius:12px;--radius-sm:8px;--cols:1}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden}
#root{height:100%;display:flex;flex-direction:column}
@media(orientation:landscape){#root{flex-direction:row}.tab-bar{flex-direction:column!important;width:68px!important;height:100%!important;border-top:none!important;border-right:1px solid var(--border)!important;position:static!important;order:-1;padding:8px 0;overflow-y:auto}.tab{flex:0 0 auto!important;padding:10px 0!important;gap:3px!important;min-height:56px}.tab span{display:block!important;font-size:8px!important}#content-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}}
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 16px 10px;flex-shrink:0}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.logo{font-size:20px;font-weight:700;letter-spacing:-0.5px;display:flex;align-items:center;gap:8px}
.logo span{color:var(--accent)}
.logo-right{display:flex;align-items:center;gap:8px}
.online-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.lang-btn{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:4px 9px;font-size:11px;font-weight:700;cursor:pointer;color:var(--text2)}
.btn-add{background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);padding:8px 12px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:4px;white-space:nowrap}
.btn-add:active{background:var(--accent2)}
.btn-add-exp{background:var(--bg3);color:var(--red);border:1px solid rgba(240,96,96,0.3);border-radius:var(--radius-sm);padding:8px 12px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:4px;white-space:nowrap}
.btn-add-exp:active{background:var(--bg4)}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.stat{background:var(--bg3);border-radius:var(--radius-sm);padding:7px 4px;text-align:center;border:1px solid var(--border);cursor:pointer}
.stat-num{font-size:17px;font-weight:700;line-height:1}
.stat-lbl{font-size:9px;color:var(--text2);margin-top:2px;text-transform:uppercase;letter-spacing:0.3px}
@media(orientation:landscape){.header{padding:8px 12px}.header-top{margin-bottom:7px}.stat{padding:5px 3px}.stat-num{font-size:15px}}
.controls{background:var(--bg2);border-bottom:1px solid var(--border);padding:8px 16px;flex-shrink:0}
.search-wrap{position:relative}
.search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);opacity:0.4;pointer-events:none}
.search-wrap input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:9px 12px 9px 36px;font-size:14px;outline:none}
.search-wrap input:focus{border-color:var(--accent)}
.page{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:12px 16px 16px}
.page::-webkit-scrollbar{width:3px}
.page::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.games-grid{display:grid;grid-template-columns:repeat(var(--cols),1fr);gap:10px}
@media(min-width:600px){:root{--cols:2}}@media(min-width:900px){:root{--cols:3}}
@media(orientation:landscape)and(min-width:600px){:root{--cols:2}}@media(orientation:landscape)and(min-width:820px){:root{--cols:3}}
.game-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;display:flex;cursor:pointer;transition:border-color .15s,transform .1s}
.game-card:active{border-color:var(--accent);transform:scale(0.98)}
.game-cover{width:70px;min-width:70px;height:100px;background:var(--bg3);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;position:relative}
.game-cover img{width:70px;height:100px;object-fit:cover;display:block}
.game-cover svg{opacity:0.18}
.qty-badge{position:absolute;top:4px;right:4px;background:rgba(0,0,0,0.75);color:#fff;font-size:10px;font-weight:800;padding:2px 5px;border-radius:5px;line-height:1.3;backdrop-filter:blur(4px)}
.qty-badge.low{background:rgba(240,96,96,0.85)}
.game-body{flex:1;padding:9px 11px;min-width:0;display:flex;flex-direction:column;justify-content:space-between}
.game-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.game-meta{font-size:11px;color:var(--text2);margin-bottom:4px}
.game-row{display:flex;align-items:flex-start;justify-content:space-between;gap:6px}
.game-price{font-size:15px;font-weight:700}
.game-profit{font-size:11px;margin-top:1px}
.game-person{font-size:11px;color:var(--text2);margin-top:3px;display:flex;align-items:center;gap:3px}
.game-time{font-size:10px;color:var(--text3);margin-top:5px;display:flex;align-items:center;gap:4px;padding-top:5px;border-top:1px solid var(--border)}
.game-time svg{opacity:0.5;flex-shrink:0}
@media(min-width:600px){.game-cover{width:78px;min-width:78px;height:106px}.game-cover img{width:78px;height:106px}}
.badge{font-size:10px;font-weight:700;padding:3px 7px;border-radius:10px;text-transform:uppercase;letter-spacing:0.3px;white-space:nowrap}
.b-available{background:rgba(62,207,142,0.15);color:var(--green)}
.b-reserved{background:rgba(240,168,50,0.15);color:var(--amber)}
.b-reserved_exchange{background:rgba(77,168,240,0.15);color:var(--blue)}
.b-sold{background:rgba(240,96,96,0.15);color:var(--red)}
.b-exchange{background:rgba(124,109,240,0.15);color:var(--accent)}
.b-ordered{background:rgba(62,207,142,0.1);color:#7ecfa0}
.empty-state{text-align:center;padding:60px 24px;color:var(--text3);grid-column:1/-1}
.tab-bar{background:var(--bg2);border-top:1px solid var(--border);display:flex;flex-shrink:0;z-index:50}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;padding:7px 2px 12px;cursor:pointer;color:var(--text3);gap:2px;background:none;border:none;transition:color .15s;min-width:0}
.tab span{font-size:9px;text-transform:uppercase;letter-spacing:0.3px;font-weight:600;white-space:nowrap}
.tab.active{color:var(--accent)}
@media(orientation:portrait){.tab-bar{padding-bottom:env(safe-area-inset-bottom,0)}}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(3px)}
@media(min-width:600px){.modal-overlay{align-items:center}.modal{border-radius:var(--radius)!important;max-height:88vh!important}}
.modal{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;padding:20px 16px 40px;border-top:1px solid var(--border2)}
.modal::-webkit-scrollbar{display:none}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px}
@media(min-width:600px){.modal-handle{display:none}}
.modal-title{font-size:18px;font-weight:700;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.btn-close{background:var(--bg3);border:none;border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);font-size:18px}
.field{margin-bottom:13px}
.field label{font-size:11px;font-weight:700;color:var(--text2);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.4px}
.field input,.field select,.field textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:10px 12px;font-size:14px;font-family:inherit;outline:none;transition:border-color .15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
.field select option{background:var(--bg2)}
.field textarea{resize:none;height:68px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.opt-label{font-size:11px;color:var(--text3);margin-top:3px}
.suggest-list{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);overflow:hidden;margin-top:6px;max-height:190px;overflow-y:auto}
.suggest-item{display:flex;align-items:center;gap:10px;padding:9px 10px;cursor:pointer;border-bottom:1px solid var(--border)}
.suggest-item:last-child{border-bottom:none}
.suggest-item:active{background:var(--bg4)}
.sug-thumb{width:32px;height:44px;object-fit:cover;border-radius:4px;background:var(--bg4);flex-shrink:0}
.sug-name{font-size:13px;font-weight:500;line-height:1.3}
.sug-year{font-size:11px;color:var(--text2);margin-top:1px}
.hint{font-size:11px;color:var(--text3);margin-top:4px}
.status-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.st-opt{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 4px;text-align:center;cursor:pointer;font-size:11px;font-weight:600;color:var(--text2);transition:all .15s;line-height:1.3}
.st-opt.sel{border-color:var(--accent);color:var(--accent);background:rgba(124,109,240,0.12)}
.divider{height:1px;background:var(--border);margin:13px 0}
.sec-label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:9px}
.btn-primary{width:100%;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);padding:13px;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px}
.btn-primary:active{background:var(--accent2)}
.btn-danger{width:100%;background:rgba(240,96,96,0.1);border:1px solid rgba(240,96,96,0.3);color:var(--red);border-radius:var(--radius-sm);padding:12px;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px}
.btn-secondary{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text2);border-radius:var(--radius-sm);padding:12px;font-size:14px;cursor:pointer;margin-top:8px}
.qty-ctrl{display:flex;align-items:center;gap:0;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;background:var(--bg3)}
.qty-btn{background:none;border:none;color:var(--text);font-size:20px;font-weight:300;padding:8px 14px;cursor:pointer;line-height:1}
.qty-btn:active{background:var(--bg4)}
.qty-val{font-size:16px;font-weight:700;min-width:36px;text-align:center}
.detail-cover{width:100%;height:155px;border-radius:var(--radius);background:var(--bg3);display:flex;align-items:center;justify-content:center;margin-bottom:14px;overflow:hidden}
.detail-cover img{width:100%;height:155px;object-fit:cover;border-radius:var(--radius);display:block}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border)}
.info-row:last-child{border-bottom:none}
.info-key{font-size:13px;color:var(--text2)}
.info-val{font-size:13px;font-weight:600;text-align:right;max-width:60%}
.quick-status{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:10px}
.qs-btn{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 4px;text-align:center;cursor:pointer;font-size:11px;font-weight:600;color:var(--text2)}
.qs-btn:active{border-color:var(--accent)}
.sell-popup{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:24px 16px 40px;border-top:1px solid var(--border2)}
.sell-popup h3{font-size:18px;font-weight:700;margin-bottom:6px}
.sell-popup p{font-size:13px;color:var(--text2);margin-bottom:18px}
.sell-input-wrap{position:relative;margin-bottom:16px}
.sell-input-wrap input{width:100%;background:var(--bg3);border:2px solid var(--accent);border-radius:var(--radius-sm);color:var(--text);padding:14px 44px 14px 14px;font-size:22px;font-weight:700;outline:none}
.sell-input-wrap span{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:18px;font-weight:700;color:var(--text2)}
.period-row{display:flex;gap:6px;margin-bottom:14px}
.period-btn{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:5px 13px;font-size:12px;font-weight:600;cursor:pointer;color:var(--text2)}
.period-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.fin-cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
@media(min-width:600px){.fin-cards{grid-template-columns:repeat(4,1fr)}}
.fin-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:13px}
.fin-card-lbl{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:5px}
.fin-card-val{font-size:21px;font-weight:800;line-height:1}
.fin-card-sub{font-size:11px;color:var(--text3);margin-top:3px}
.stats-layout{display:flex;flex-direction:column;gap:12px}
@media(min-width:700px),(orientation:landscape){.stats-layout{flex-direction:row;align-items:flex-start}.stats-layout .chart-wrap{flex:0 0 240px}.stats-layout .stats-right{flex:1;min-width:0}}
.chart-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;display:flex;flex-direction:column;align-items:center}
.chart-title{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:12px;align-self:flex-start}
.legend{display:flex;flex-direction:column;gap:7px;margin-top:12px;width:100%}
.legend-item{display:flex;align-items:center;justify-content:space-between}
.legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-right:8px}
.legend-label{font-size:12px;color:var(--text2)}
.legend-val{font-size:12px;font-weight:700}
.expenses-section{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:13px}
.exp-title{font-size:14px;font-weight:700;margin-bottom:10px}
.exp-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.exp-item:last-child{border-bottom:none}
.exp-amount{font-size:13px;font-weight:700;color:var(--red)}
.btn-exp-add{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text2);margin-top:9px}
.ship-grid{display:grid;grid-template-columns:1fr;gap:10px}
@media(min-width:600px){.ship-grid{grid-template-columns:1fr 1fr}}
.ship-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:13px}
.ship-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.ship-name{font-size:15px;font-weight:700}
.ship-date{font-size:11px;color:var(--text2);margin-top:2px}
.ship-cost{font-size:15px;font-weight:800;color:var(--red)}
.ship-per{font-size:11px;color:var(--text2);margin-top:1px}
.btn-new-ship{width:100%;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);padding:12px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:12px}
.exp-type-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.exp-type-btn{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 8px;text-align:center;cursor:pointer;font-size:12px;font-weight:600;color:var(--text2)}
.exp-type-btn.sel{border-color:var(--accent);color:var(--accent);background:rgba(124,109,240,0.12)}
.toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%);background:var(--bg4);border:1px solid var(--border2);color:var(--text);padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:500;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
@media(orientation:landscape){.toast{bottom:16px}}
#install-banner{display:none;position:fixed;bottom:72px;left:12px;right:12px;background:var(--accent);border-radius:var(--radius);padding:12px 14px;z-index:300;align-items:center;justify-content:space-between;gap:10px;box-shadow:0 4px 20px rgba(124,109,240,0.4)}
#install-banner.show{display:flex}
#install-banner p{font-size:13px;font-weight:600;color:#fff;line-height:1.3}
#install-banner p span{font-size:11px;font-weight:400;opacity:0.8;display:block;margin-top:1px}
.install-btns{display:flex;gap:7px;flex-shrink:0}
.btn-install{background:#fff;color:var(--accent);border:none;border-radius:var(--radius-sm);padding:7px 13px;font-size:13px;font-weight:700;cursor:pointer}
.btn-dismiss{background:rgba(255,255,255,0.2);color:#fff;border:none;border-radius:var(--radius-sm);padding:7px 10px;font-size:13px;cursor:pointer}
#loader{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:16px}
.loader-logo{font-size:34px;font-weight:800;letter-spacing:-1px}
.loader-logo span{color:var(--accent)}
.loader-dots{display:flex;gap:7px}
.loader-dots i{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:dot 1.2s infinite;font-style:normal}
.loader-dots i:nth-child(2){animation-delay:.2s}
.loader-dots i:nth-child(3){animation-delay:.4s}
@keyframes dot{0%,80%,100%{opacity:.2;transform:scale(0.8)}40%{opacity:1;transform:scale(1)}}
</style>
</head>
<body>
<div id="loader"><div class="loader-logo"><span>ND</span> Games</div><div class="loader-dots"><i></i><i></i><i></i></div></div>
<div id="root" style="display:none">
  <div class="tab-bar">
    <button class="tab active" id="tab-available" onclick="setPage('available')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg><span id="tl-available">Наличие</span></button>
    <button class="tab" id="tab-reserved" onclick="setPage('reserved')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg><span id="tl-reserved">Резервы</span></button>
    <button class="tab" id="tab-sold" onclick="setPage('sold')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M20 7H4a2 2 0 00-2 2v6a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z"/><path d="M16 12h.01"/></svg><span id="tl-sold">Продажи</span></button>
    <button class="tab" id="tab-exchange" onclick="setPage('exchange')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M7 16V4m0 0L3 8m4-4l4 4M17 8v12m0 0l4-4m-4 4l-4-4"/></svg><span id="tl-exchange">Обмен</span></button>
    <button class="tab" id="tab-shipments" onclick="setPage('shipments')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/></svg><span id="tl-shipments">Партии</span></button>
    <button class="tab" id="tab-stats" onclick="setPage('stats')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M18 20V10M12 20V4M6 20v-6"/></svg><span id="tl-stats">Финансы</span></button>
  </div>
  <div id="content-area" style="flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0">
    <div class="header">
      <div class="header-top">
        <div class="logo"><span>ND</span> Games <div class="online-dot" id="online-dot"></div></div>

// HELPERS
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2200);}
function gel(a,c){return parseFloat(a||0)*({'₾':1,'$':2.7,'€':2.95}[c]||1);}
function calcProfit(g){
  const price=parseFloat(g.price||0);if(!price)return null;
  const cost=g.cost?gel(g.cost,g.costCurrency||'₾'):0;
  const delC=parseFloat(g.deliveryCost||0);
  const shipC=g.shipmentId&&S.shipments[g.shipmentId]?parseFloat(S.shipments[g.shipmentId].perDisc||0):0;
  if(!g.cost)return price;
  return price-(cost+delC+shipC);
}
function fmtDate(ts){
  if(!ts)return'';
  const d=new Date(ts);
  const now=new Date();
  const isToday=d.toDateString()===now.toDateString();
  const isYesterday=d.toDateString()===new Date(now-86400000).toDateString();
  const time=d.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
  if(isToday)return time;
  if(isYesterday)return(lang==='ka'?'გუშინ':'вчера')+' '+time;
  return d.toLocaleDateString('ru-RU',{day:'numeric',month:'short'})+' '+time;
}

// STATS BAR
function renderStats(){
  const g=Object.values(S.games),c={total:0,av:0,res:0,sold:0};
  g.forEach(x=>{
    const qty=parseInt(x.qty||1);
    c.total+=qty;
    if(['available','ordered'].includes(x.status))c.av+=qty;
    if(['reserved','reserved_exchange'].includes(x.status))c.res+=qty;
    if(x.status==='sold')c.sold+=1; // count transactions not units
  });
  const r=document.getElementById('stats-row');
  if(r)r.innerHTML=`<div class="stat" onclick="setPage('available')"><div class="stat-num">${c.total}</div><div class="stat-lbl">${t('total')}</div></div><div class="stat" onclick="setPage('available')"><div class="stat-num" style="color:var(--green)">${c.av}</div><div class="stat-lbl">${t('instock')}</div></div><div class="stat" onclick="setPage('reserved')"><div class="stat-num" style="color:var(--amber)">${c.res}</div><div class="stat-lbl">${t('reserves')}</div></div><div class="stat" onclick="setPage('sold')"><div class="stat-num" style="color:var(--red)">${c.sold}</div><div class="stat-lbl">${t('sold_s')}</div></div>`;
}

// RENDER LIST
function renderList(){
  renderStats();
  const q=(document.getElementById('search-inp')||{}).value||'';
  ['available','reserved','sold','exchange'].forEach(pageId=>{
    let g=Object.entries(S.games).map(([id,x])=>({...x,id})).filter(x=>PAGE_ST[pageId].includes(x.status));
    if(q)g=g.filter(x=>x.title&&x.title.toLowerCase().includes(q.toLowerCase()));
    g.sort((a,b)=>(b.addedAt||0)-(a.addedAt||0));
    const grid=document.getElementById('grid-'+pageId);if(!grid)return;
    if(!g.length){grid.innerHTML=`<div class="empty-state"><svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg><p style="margin-top:10px">${t('no_discs')}</p></div>`;return;}
    grid.innerHTML=g.map(x=>{
      const st=STATUSES[x.status]||STATUSES.available;
      const qty=parseInt(x.qty||1);
      const cover=x.cover?`<img src="${x.cover}" alt="" loading="lazy" onerror="this.style.display='none'">`:`<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>`;
      const qtyBadge=qty>1?`<div class="qty-badge${qty===1?' low':''}">${qty>1?'×'+qty:''}</div>`:'';
      const profit=calcProfit(x);
      const profHtml=profit!==null?`<div class="game-profit" style="color:${profit>=0?'var(--green)':'var(--red)'}">${profit>=0?'+':''}${profit.toFixed(0)} ₾</div>`:'';
      const perHtml=x.person?`<div class="game-person"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>${x.person}</div>`:'';
      // timestamp line
      let tsLabel='', tsVal=0;
      if(x.status==='sold'&&x.soldAt){tsLabel=t('sold_at');tsVal=x.soldAt;}
      else if(x.status==='exchange'&&x.exchangedAt){tsLabel=t('exchanged_at');tsVal=x.exchangedAt;}
      else if(x.addedAt){tsLabel=t('added_at');tsVal=x.addedAt;}
      const timeHtml=tsVal?`<div class="game-time"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg><span>${tsLabel} ${fmtDate(tsVal)}</span></div>`:'';
      return `<div class="game-card" onclick="openDetail('${x.id}')"><div class="game-cover">${cover}${qtyBadge}</div><div class="game-body"><div><div class="game-title">${x.title||'—'}</div><div class="game-meta">${x.platform||'PS4/PS5'}${x.region?' · '+x.region:''}</div></div><div><div class="game-row"><div><div class="game-price">${x.price?x.price+' ₾':'—'}</div>${profHtml}</div><span class="badge ${st.badge}">${t('st_'+x.status)}</span></div>${perHtml}${timeHtml}</div></div></div>`;
    }).join('');
  });
}

function onTitleInput(val){

async function fetchSugg(q){
  try{
    const platEl=document.getElementById('inp-platform');
    const plat=platEl?platEl.value:'PS5';
    const platId=plat==='PS5'?'187':plat==='PS4'?'18':'18,187';
    const r=await fetch(`https://api.rawg.io/api/games?key=65ce323e7413493980cdf795a14073c5&search=${encodeURIComponent(q)}&page_size=6&platforms=${platId}`);
    const data=await r.json();
    S.sugg=data.results||[];
    const h=document.getElementById('cover-hint');if(h)h.textContent='';
    const box=document.getElementById('suggest-box');if(!box)return;
    if(!S.sugg.length){box.innerHTML='';return;}
    box.innerHTML=`<div class="suggest-list">${S.sugg.map((g,i)=>`<div class="suggest-item" onclick="selectSugg(${i})">${g.background_image?`<img class="sug-thumb" src="${g.background_image}" alt="" loading="lazy">`:`<div class="sug-thumb"></div>`}<div><div class="sug-name">${g.name}</div><div class="sug-year">${g.released?g.released.slice(0,4):''}</div></div></div>`).join('')}</div>`;
  }catch(e){const h=document.getElementById('cover-hint');if(h)h.textContent=t('no_conn');const b=document.getElementById('suggest-box');if(b)b.innerHTML='';}
}

// STATS
function setStatPeriod(p){S.statPeriod=p;renderStatsPage();}
function renderStatsPage(){
  const page=document.getElementById('page-stats');if(!page)return;
  const now=new Date(),games=Object.values(S.games),expenses=Object.values(S.expenses);
  function inP(ts){if(!ts)return false;const d=new Date(ts);if(S.statPeriod==='month')return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();if(S.statPeriod==='week')return d>=(new Date(now-7*86400000));return d.getFullYear()===now.getFullYear();}
  const sold=games.filter(g=>g.status==='sold'&&inP(g.soldAt||g.addedAt));
  const revenue=sold.reduce((s,g)=>s+parseFloat(g.price||0),0);
  let cogs=0;sold.forEach(g=>{if(g.cost)cogs+=gel(g.cost,g.costCurrency||'₾');cogs+=parseFloat(g.deliveryCost||0);if(g.shipmentId&&S.shipments[g.shipmentId])cogs+=parseFloat(S.shipments[g.shipmentId].perDisc||0);});
  const pExp=expenses.filter(e=>inP(e.date)),extraExp=pExp.reduce((s,e)=>s+parseFloat(e.amount||0),0),profit=revenue-(cogs+extraExp);
  const dd=[{label:t('revenue'),value:revenue,color:'#3ecf8e'},{label:t('cogs'),value:cogs,color:'#f06060'},{label:t('extra_exp'),value:extraExp,color:'#f0a832'}];
  page.innerHTML=`<div class="period-row">${['month','week','year'].map(p=>`<button class="period-btn${S.statPeriod===p?' active':''}" onclick="setStatPeriod('${p}')">${t('p'+p.charAt(0))}</button>`).join('')}</div>
    <div class="fin-cards"><div class="fin-card"><div class="fin-card-lbl">${t('revenue')}</div><div class="fin-card-val" style="color:var(--green)">${revenue.toFixed(0)} ₾</div><div class="fin-card-sub">${sold.length} ${t('sales_n')}</div></div><div class="fin-card"><div class="fin-card-lbl">${t('profit')}</div><div class="fin-card-val" style="color:${profit>=0?'var(--green)':'var(--red)'}">${profit>=0?'+':''}${profit.toFixed(0)} ₾</div><div class="fin-card-sub">${t('net')}</div></div><div class="fin-card"><div class="fin-card-lbl">${t('cogs')}</div><div class="fin-card-val" style="color:var(--red)">${cogs.toFixed(0)} ₾</div><div class="fin-card-sub">${t('of_sold')}</div></div><div class="fin-card"><div class="fin-card-lbl">${t('extra_exp')}</div><div class="fin-card-val" style="color:var(--amber)">${extraExp.toFixed(0)} ₾</div><div class="fin-card-sub">${t('period')}</div></div></div>
    <div class="stats-layout"><div class="chart-wrap"><div class="chart-title">${t('structure')}</div><canvas id="donut" width="155" height="155"></canvas><div class="legend">${dd.map(d=>`<div class="legend-item"><div style="display:flex;align-items:center"><div class="legend-dot" style="background:${d.color}"></div><div class="legend-label">${d.label}</div></div><div class="legend-val" style="color:${d.color}">${d.value.toFixed(0)} ₾</div></div>`).join('')}<div class="legend-item" style="border-top:1px solid var(--border);padding-top:7px;margin-top:4px"><div style="display:flex;align-items:center"><div class="legend-dot" style="background:var(--accent)"></div><div class="legend-label">${t('profit')}</div></div><div class="legend-val" style="color:${profit>=0?'var(--green)':'var(--red)'}">${profit>=0?'+':''}${profit.toFixed(0)} ₾</div></div></div></div>
    <div class="stats-right"><div class="expenses-section"><div class="exp-title">${t('exp_title')}</div>${pExp.length?pExp.sort((a,b)=>(b.date||0)-(a.date||0)).map(e=>`<div class="exp-item"><div><div style="font-size:13px;font-weight:600">${e.name}</div>${e.to?`<div style="font-size:11px;color:var(--text2)">${t('exp_to')}: ${e.to}</div>`:''}<div style="font-size:11px;color:var(--text3)">${e.type==='shipping'?t('exp_ship'):t('exp_other')} · ${fmtDate(e.date)}</div></div><div style="display:flex;align-items:center;gap:8px"><div class="exp-amount">-${e.amount} ₾</div><button onclick="deleteExpense('${e.id}')" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:20px;line-height:1">×</button></div></div>`).join(''):`<div style="font-size:13px;color:var(--text3);text-align:center;padding:14px 0">${t('no_exp')}</div>`}<button class="btn-exp-add" onclick="openAddExpense()">${t('add_exp')}</button></div></div></div>`;
  drawDonut(dd);
}
function drawDonut(data){
  const canvas=document.getElementById('donut');if(!canvas)return;
  const ctx=canvas.getContext('2d'),total=data.reduce((s,d)=>s+d.value,0);
  if(total===0){ctx.clearRect(0,0,155,155);return;}
  function draw(p){ctx.clearRect(0,0,155,155);let s=-Math.PI/2;segs.forEach(d=>{const end=s+d.value/total*2*Math.PI*p;ctx.beginPath();ctx.moveTo(77,77);ctx.arc(77,77,63,s,end);ctx.closePath();ctx.fillStyle=d.color;ctx.fill();s=end;});ctx.beginPath();ctx.arc(77,77,38,0,2*Math.PI);ctx.fillStyle='#17171e';ctx.fill();ctx.fillStyle='#f0f0f5';ctx.font='bold 13px -apple-system,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('\u20be'+Math.round(total*p),77,77);}
  const t0=performance.now();(function anim(now){const p=Math.min((now-t0)/900,1);draw(1-Math.pow(1-p,3));if(p<1)requestAnimationFrame(anim);})(t0);
}

// EXPENSES
function openAddExpense(fromHeader){
  S.selExpType='other';
  document.getElementById('modal-root').innerHTML=`<div class="modal-overlay" onclick="closeModal(event)"><div class="modal" onclick="event.stopPropagation()"><div class="modal-handle"></div><div class="modal-title">${t('add_exp')} <button class="btn-close" onclick="closeModalForce()">\u00d7</button></div>
    <div class="field"><label>${t('exp_type')}</label><div class="exp-type-grid"><div class="exp-type-btn" id="et-shipping" onclick="selExpType('shipping')">${t('exp_ship')}</div><div class="exp-type-btn sel" id="et-other" onclick="selExpType('other')">${t('exp_other')}</div></div></div>
    <div class="field"><label>${t('exp_desc')}</label><input id="exp-name" type="text" placeholder="..."></div>
    <div class="field"><label>${t('exp_to')}</label><input id="exp-to" type="text" placeholder="..."></div>
    <div class="row2"><div class="field"><label>${t('exp_amount')}</label><input id="exp-amount" type="number" placeholder="0"></div><div class="field"><label>${t('exp_date')}</label><input id="exp-date" type="date" value="${new Date().toISOString().slice(0,10)}"></div></div>
    <button class="btn-primary" onclick="saveExpense()">${t('save')}</button>
  </div></div>`;
}
function selExpType(tp){S.selExpType=tp;document.querySelectorAll('.exp-type-btn').forEach(el=>el.classList.remove('sel'));const el=document.getElementById('et-'+tp);if(el)el.classList.add('sel');}
function saveExpense(){
  const name=document.getElementById('exp-name').value.trim(),to=document.getElementById('exp-to').value.trim(),amount=parseFloat(document.getElementById('exp-amount').value)||0,date=new Date(document.getElementById('exp-date').value).getTime();
  if(!name||!amount){showToast(t('fill_all'));return;}
  const id=uid();db.ref('expenses/'+id).set({id,name,to,amount,date,type:S.selExpType});
  showToast(t('exp_added'));closeModalForce();if(S.page==='stats')renderStatsPage();
}
function deleteExpense(id){if(!confirm(t('del_exp')))return;db.ref('expenses/'+id).remove();showToast(t('deleted'));if(S.page==='stats')renderStatsPage();}

function closeModal(e){if(e.target===e.currentTarget)closeModalForce();}
function closeModalForce(){document.getElementById('modal-root').innerHTML='';}

window.setPage=setPage;window.openAdd=openAdd;window.openDetail=openDetail;window.quickStatus=quickStatus;window.openSellPopup=openSellPopup;window.openSellOnePopup=openSellOnePopup;window.confirmSell=confirmSell;window.confirmSellOne=confirmSellOne;window.changeQty=changeQty;window.selStatus=selStatus;window.onTitleInput=onTitleInput;window.selectSugg=selectSugg;window.addGame=addGame;window.saveEdit=saveEdit;window.deleteGame=deleteGame;window.renderShipments=renderShipments;window.openAddShipment=openAddShipment;window.saveShipment=saveShipment;window.deleteShipment=deleteShipment;window.setStatPeriod=setStatPeriod;window.openAddExpense=openAddExpense;window.selExpType=selExpType;window.saveExpense=saveExpense;window.deleteExpense=deleteExpense;window.closeModal=closeModal;window.closeModalForce=closeModalForce;window.toggleLang=toggleLang;window.renderList=renderList;
</script>
