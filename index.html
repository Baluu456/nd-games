<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ND Games">
<meta name="theme-color" content="#0f0f13">
<link rel="manifest" id="manifest-ph">
<title>ND Games</title>
<style>
:root{--bg:#0f0f13;--bg2:#17171e;--bg3:#1e1e28;--bg4:#25252f;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);--text:#f0f0f5;--text2:#9090a8;--text3:#5a5a72;--accent:#7c6df0;--accent2:#5a4dd4;--green:#3ecf8e;--red:#f06060;--amber:#f0a832;--blue:#4da8f0;--radius:12px;--radius-sm:8px;--cols:1}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden}
#root{height:100%;display:flex;flex-direction:column}
@media(orientation:landscape){#root{flex-direction:row}.tab-bar{flex-direction:column!important;width:70px!important;height:100%!important;border-top:none!important;border-right:1px solid var(--border)!important;position:static!important;order:-1;padding:8px 0;overflow-y:auto}.tab{flex:0 0 auto!important;padding:9px 0!important;gap:3px!important;min-height:52px}.tab span{display:block!important;font-size:7px!important}#content-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}}
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 16px 10px;flex-shrink:0}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.logo{font-size:20px;font-weight:700;letter-spacing:-0.5px;display:flex;align-items:center;gap:8px}
.logo span{color:var(--accent)}
.logo-right{display:flex;align-items:center;gap:5px;flex-wrap:wrap;justify-content:flex-end}
.online-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.lang-btn{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:11px;font-weight:700;cursor:pointer;color:var(--text2)}
.btn-add{background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);padding:7px 11px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:4px;white-space:nowrap}
.btn-add:active{background:var(--accent2)}
.btn-add-exp{background:var(--bg3);color:var(--red);border:1px solid rgba(240,96,96,0.3);border-radius:var(--radius-sm);padding:6px 8px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:3px;white-space:nowrap}
@media(max-width:420px){.btn-add-exp span,.btn-add span{display:none}.btn-add-exp,.btn-add{padding:7px 9px}}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.stat{background:var(--bg3);border-radius:var(--radius-sm);padding:6px 4px;text-align:center;border:1px solid var(--border);cursor:pointer}
.stat-num{font-size:16px;font-weight:700;line-height:1}
.stat-lbl{font-size:9px;color:var(--text2);margin-top:2px;text-transform:uppercase;letter-spacing:0.3px}
.type-switcher{display:flex;gap:6px;padding:8px 16px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
.type-btn{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 4px;font-size:12px;font-weight:700;cursor:pointer;color:var(--text2);text-align:center;transition:all .15s}
.type-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.controls{background:var(--bg2);border-bottom:1px solid var(--border);padding:8px 16px;flex-shrink:0}
.search-wrap{position:relative}
.search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);opacity:0.4;pointer-events:none}
.search-wrap input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:9px 12px 9px 36px;font-size:14px;outline:none}
.search-wrap input:focus{border-color:var(--accent)}
.page{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:12px 16px 16px}
.page::-webkit-scrollbar{width:3px}
.page::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.games-grid{display:grid;grid-template-columns:repeat(var(--cols),1fr);gap:10px}
@media(min-width:600px){:root{--cols:2}}@media(min-width:900px){:root{--cols:3}}@media(min-width:1200px){:root{--cols:4}}
@media(orientation:landscape)and(min-width:600px){:root{--cols:2}}@media(orientation:landscape)and(min-width:820px){:root{--cols:3}}
.game-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;display:flex;cursor:pointer;transition:border-color .15s,transform .1s;min-height:120px}
.game-card:active{border-color:var(--accent);transform:scale(0.98)}
.game-cover{width:86px;min-width:86px;height:120px;background:var(--bg3);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;position:relative}
.game-cover img{width:86px;height:120px;object-fit:cover;object-position:center top;display:block}
.game-cover svg{opacity:0.18}
@media(min-width:600px){.game-cover{width:78px;min-width:78px;height:108px}.game-cover img{width:78px;height:108px}}
.qty-badge{position:absolute;top:4px;right:4px;background:rgba(0,0,0,0.78);color:#fff;font-size:9px;font-weight:800;padding:2px 5px;border-radius:5px;line-height:1.3}
.cond-badge{position:absolute;bottom:4px;left:4px;font-size:9px;font-weight:800;padding:2px 5px;border-radius:4px;line-height:1.3}
.cond-new{background:rgba(62,207,142,0.85);color:#000}
.cond-used{background:rgba(255,255,255,0.18);color:#fff}
.game-body{flex:1;padding:8px 10px;min-width:0;display:flex;flex-direction:column;justify-content:space-between}
.game-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.game-meta{font-size:11px;color:var(--text2);margin-bottom:4px}
.game-row{display:flex;align-items:flex-start;justify-content:space-between;gap:6px}
.game-price{font-size:15px;font-weight:700}
.game-profit{font-size:11px;margin-top:1px}
.game-person{font-size:11px;color:var(--text2);margin-top:3px;display:flex;align-items:center;gap:3px}
.game-time{font-size:10px;color:var(--text3);margin-top:5px;display:flex;align-items:center;gap:4px;padding-top:5px;border-top:1px solid var(--border)}

.badge{font-size:10px;font-weight:700;padding:3px 7px;border-radius:10px;text-transform:uppercase;letter-spacing:0.3px;white-space:nowrap}
.b-available{background:rgba(62,207,142,0.15);color:var(--green)}
.b-reserved{background:rgba(240,168,50,0.15);color:var(--amber)}
.b-reserved_exchange{background:rgba(77,168,240,0.15);color:var(--blue)}
.b-sold{background:rgba(240,96,96,0.15);color:var(--red)}
.b-exchange{background:rgba(124,109,240,0.15);color:var(--accent)}
.b-ordered{background:rgba(240,168,50,0.1);color:#d4a030}
.b-transit{background:rgba(77,168,240,0.15);color:var(--blue)}
.empty-state{text-align:center;padding:60px 24px;color:var(--text3);grid-column:1/-1}
.tab-bar{background:var(--bg2);border-top:1px solid var(--border);display:flex;flex-shrink:0;z-index:50}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;padding:6px 1px 10px;cursor:pointer;color:var(--text3);gap:2px;background:none;border:none;transition:color .15s;min-width:0}
.tab span{font-size:7.5px;text-transform:uppercase;letter-spacing:0.2px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.tab.active{color:var(--accent)}
@media(orientation:portrait){.tab-bar{padding-bottom:env(safe-area-inset-bottom,0)}}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(3px)}
@media(min-width:600px){.modal-overlay{align-items:center}.modal{border-radius:var(--radius)!important;max-height:88vh!important}}
.modal{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-width:580px;max-height:92vh;overflow-y:auto;padding:20px 16px 40px;border-top:1px solid var(--border2)}
.modal::-webkit-scrollbar{display:none}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px}
@media(min-width:600px){.modal-handle{display:none}}
.modal-title{font-size:18px;font-weight:700;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.btn-close{background:var(--bg3);border:none;border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);font-size:18px}
.field{margin-bottom:13px}
.field label{font-size:11px;font-weight:700;color:var(--text2);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.4px}
.field input,.field select,.field textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:10px 12px;font-size:14px;font-family:inherit;outline:none;transition:border-color .15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
.field select option{background:var(--bg2)}
.field textarea{resize:none;height:68px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.opt-label{font-size:11px;color:var(--text3);margin-top:3px}
.suggest-list{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);overflow:hidden;margin-top:6px;max-height:190px;overflow-y:auto}
.suggest-item{display:flex;align-items:center;gap:10px;padding:9px 10px;cursor:pointer;border-bottom:1px solid var(--border)}
.suggest-item:last-child{border-bottom:none}
.suggest-item:active{background:var(--bg4)}
.sug-thumb{width:32px;height:44px;object-fit:cover;border-radius:4px;background:var(--bg4);flex-shrink:0}
.sug-name{font-size:13px;font-weight:500;line-height:1.3}
.sug-year{font-size:11px;color:var(--text2);margin-top:1px}
.hint{font-size:11px;color:var(--text3);margin-top:4px}
.status-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.st-opt{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 4px;text-align:center;cursor:pointer;font-size:11px;font-weight:600;color:var(--text2);transition:all .15s;line-height:1.3}
.st-opt.sel{border-color:var(--accent);color:var(--accent);background:rgba(124,109,240,0.12)}
.cond-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.cond-opt{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;text-align:center;cursor:pointer;font-size:13px;font-weight:600;color:var(--text2);transition:all .15s}
.cond-opt.sel{border-color:var(--accent);color:var(--accent);background:rgba(124,109,240,0.12)}
.divider{height:1px;background:var(--border);margin:13px 0}
.sec-label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:9px}
.btn-primary{width:100%;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);padding:13px;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px}
.btn-primary:active{background:var(--accent2)}
.btn-danger{width:100%;background:rgba(240,96,96,0.1);border:1px solid rgba(240,96,96,0.3);color:var(--red);border-radius:var(--radius-sm);padding:12px;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px}
.btn-secondary{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text2);border-radius:var(--radius-sm);padding:12px;font-size:14px;cursor:pointer;margin-top:8px}
.qty-ctrl{display:flex;align-items:center;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;background:var(--bg3);width:fit-content}
.qty-btn{background:none;border:none;color:var(--text);font-size:20px;font-weight:300;padding:8px 16px;cursor:pointer;line-height:1}
.qty-btn:active{background:var(--bg4)}
.qty-val{font-size:16px;font-weight:700;min-width:40px;text-align:center}
.detail-cover{width:100%;height:155px;border-radius:var(--radius);background:var(--bg3);display:flex;align-items:center;justify-content:center;margin-bottom:14px;overflow:hidden}
.detail-cover img{width:100%;height:155px;object-fit:cover;border-radius:var(--radius);display:block}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border)}
.info-row:last-child{border-bottom:none}
.info-key{font-size:13px;color:var(--text2)}
.info-val{font-size:13px;font-weight:600;text-align:right;max-width:60%}
.quick-status{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:10px}
.qs-btn{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 4px;text-align:center;cursor:pointer;font-size:11px;font-weight:600;color:var(--text2)}
.qs-btn:active{border-color:var(--accent)}
.sell-popup{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:24px 16px 40px;border-top:1px solid var(--border2)}
.sell-popup h3{font-size:18px;font-weight:700;margin-bottom:6px}
.sell-popup p{font-size:13px;color:var(--text2);margin-bottom:18px}
.sell-input-wrap{position:relative;margin-bottom:16px}
.sell-input-wrap input{width:100%;background:var(--bg3);border:2px solid var(--accent);border-radius:var(--radius-sm);color:var(--text);padding:14px 44px 14px 14px;font-size:22px;font-weight:700;outline:none}
.sell-input-wrap span{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:18px;font-weight:700;color:var(--text2)}
.period-row{display:flex;gap:6px;margin-bottom:14px}
.period-btn{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:5px 13px;font-size:12px;font-weight:600;cursor:pointer;color:var(--text2)}
.period-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.fin-cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
@media(min-width:600px){.fin-cards{grid-template-columns:repeat(3,1fr)}}
.fin-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:13px}
.fin-card-lbl{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:5px}
.fin-card-val{font-size:21px;font-weight:800;line-height:1}
.fin-card-sub{font-size:11px;color:var(--text3);margin-top:3px}
.stats-layout{display:flex;flex-direction:column;gap:12px}
@media(min-width:700px),(orientation:landscape){.stats-layout{flex-direction:row;align-items:flex-start}.stats-layout .chart-wrap{flex:0 0 240px}.stats-layout .stats-right{flex:1;min-width:0}}
.chart-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;display:flex;flex-direction:column;align-items:center}
.chart-title{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:12px;align-self:flex-start}
.legend{display:flex;flex-direction:column;gap:7px;margin-top:12px;width:100%}
.legend-item{display:flex;align-items:center;justify-content:space-between}
.legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-right:8px}
.legend-label{font-size:12px;color:var(--text2)}
.legend-val{font-size:12px;font-weight:700}
.expenses-section{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:13px}
.exp-title{font-size:14px;font-weight:700;margin-bottom:10px}

.exp-item:last-child{border-bottom:none}
.exp-amount{font-size:13px;font-weight:700;color:var(--red)}
.btn-exp-add{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text2);margin-top:9px}
.ship-grid{display:grid;grid-template-columns:1fr;gap:10px}
@media(min-width:600px){.ship-grid{grid-template-columns:1fr 1fr}}
.ship-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:13px}
.ship-status-row{display:flex;gap:6px;margin-bottom:10px}
.ship-status-btn{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 4px;text-align:center;cursor:pointer;font-size:11px;font-weight:600;color:var(--text2)}
.ship-status-btn.active-transit{border-color:var(--blue);color:var(--blue);background:rgba(77,168,240,0.1)}
.ship-status-btn.active-received{border-color:var(--green);color:var(--green);background:rgba(62,207,142,0.1)}
.btn-new-ship{width:100%;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);padding:12px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:12px}
.exp-type-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.exp-type-btn{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 8px;text-align:center;cursor:pointer;font-size:12px;font-weight:600;color:var(--text2)}
.exp-type-btn.sel{border-color:var(--accent);color:var(--accent);background:rgba(124,109,240,0.12)}
.disc-slot{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;margin-bottom:8px}
.disc-slot-num{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:8px}
.disc-slot-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px}
.disc-slot input,.disc-slot select{width:100%;background:var(--bg4);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:8px 10px;font-size:13px;font-family:inherit;outline:none}

.slot-sugg-box{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);overflow:hidden;margin-top:4px;max-height:180px;overflow-y:auto;position:absolute;left:0;right:0;z-index:100}
.slot-sugg-item{display:flex;align-items:center;gap:8px;padding:8px 10px;cursor:pointer;border-bottom:1px solid var(--border)}
.slot-sugg-item:last-child{border-bottom:none}
.slot-sugg-item:active{background:var(--bg4)}
.calc-wrap{max-width:440px;margin:0 auto}
.calc-title{font-size:20px;font-weight:800;margin-bottom:4px}
.calc-sub{font-size:13px;color:var(--text2);margin-bottom:18px}
.rates-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:16px}
.rates-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.rates-title{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.4px}
.rates-time{font-size:11px;color:var(--text3)}
.rate-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.rate-row:last-child{border-bottom:none}
.rate-left{display:flex;align-items:center;gap:10px}
.rate-flag{font-size:20px}
.rate-name{font-size:14px;font-weight:600}
.rate-code{font-size:11px;color:var(--text2)}
.rate-val{font-size:16px;font-weight:800;color:var(--accent)}
.calc-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.calc-top{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:end;margin-bottom:16px}
.calc-arrow{font-size:22px;text-align:center;padding-bottom:8px;color:var(--text2)}
.flabel{font-size:11px;font-weight:700;color:var(--text2);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.4px}
.calc-big{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:11px 12px;font-size:20px;font-weight:700;outline:none}
.calc-big:focus{border-color:var(--accent)}
.calc-sel{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:11px 12px;font-size:14px;font-weight:600;outline:none;margin-top:6px}
.calc-result-box{background:var(--bg3);border-radius:var(--radius-sm);padding:16px;text-align:center}
.calc-result-num{font-size:28px;font-weight:800;color:var(--green)}
.calc-result-lbl{font-size:12px;color:var(--text2);margin-top:4px}
.calc-quick{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:12px}
.calc-qbtn{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 4px;text-align:center;cursor:pointer;font-size:13px;font-weight:600;color:var(--text2)}
.calc-qbtn:active{background:var(--bg4);border-color:var(--accent)}
.rates-loading{text-align:center;padding:20px;color:var(--text3);font-size:13px}
.toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%);background:var(--bg4);border:1px solid var(--border2);color:var(--text);padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:500;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
@media(orientation:landscape){.toast{bottom:16px}}
#install-banner{display:none;position:fixed;bottom:72px;left:12px;right:12px;background:var(--accent);border-radius:var(--radius);padding:12px 14px;z-index:300;align-items:center;justify-content:space-between;gap:10px;box-shadow:0 4px 20px rgba(124,109,240,0.4)}
#install-banner.show{display:flex}
#install-banner p{font-size:13px;font-weight:600;color:#fff;line-height:1.3}
#install-banner p span{font-size:11px;font-weight:400;opacity:0.8;display:block;margin-top:1px}
.install-btns{display:flex;gap:7px;flex-shrink:0}
.btn-install{background:#fff;color:var(--accent);border:none;border-radius:var(--radius-sm);padding:7px 13px;font-size:13px;font-weight:700;cursor:pointer}
.btn-dismiss{background:rgba(255,255,255,0.2);color:#fff;border:none;border-radius:var(--radius-sm);padding:7px 10px;font-size:13px;cursor:pointer}
#loader{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:16px}
.loader-logo{font-size:34px;font-weight:800;letter-spacing:-1px}
.loader-logo span{color:var(--accent)}
.loader-dots{display:flex;gap:7px}
.loader-dots i{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:dot 1.2s infinite;font-style:normal}
.loader-dots i:nth-child(2){animation-delay:.2s}
.loader-dots i:nth-child(3){animation-delay:.4s}
@keyframes dot{0%,80%,100%{opacity:.2;transform:scale(0.8)}40%{opacity:1;transform:scale(1)}}
/* Exchange */
.exchange-page{display:flex;flex-direction:column;gap:12px}
.exchange-new-btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);padding:12px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:4px}
.exchange-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.exchange-header{display:flex;align-items:center;justify-content:space-between;padding:10px 13px;border-bottom:1px solid var(--border)}
.exchange-date{font-size:11px;color:var(--text3)}
.exchange-body{display:grid;grid-template-columns:1fr 40px 1fr;align-items:stretch;min-height:90px}
.exchange-side{padding:10px 12px}
.exchange-side-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px}
.exchange-side.gave .exchange-side-label{color:var(--red)}
.exchange-side.got .exchange-side-label{color:var(--green)}
.exchange-arrow{display:flex;align-items:center;justify-content:center;background:var(--bg3);font-size:18px;color:var(--text2)}
.exchange-disc-item{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.exchange-disc-item:last-child{margin-bottom:0}
.exchange-disc-thumb{width:28px;height:38px;object-fit:cover;border-radius:3px;background:var(--bg4);flex-shrink:0}
.exchange-disc-info{min-width:0}
.exchange-disc-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.exchange-disc-meta{font-size:10px;color:var(--text2)}
.exchange-footer{padding:8px 13px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:6px}
.exchange-to-stock-btn{background:rgba(62,207,142,0.12);border:1px solid rgba(62,207,142,0.3);color:var(--green);border-radius:var(--radius-sm);padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;flex:1}
.exchange-del-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:12px;padding:6px}
.exchange-notes{font-size:11px;color:var(--text2);flex:1}
.exchange-select-list{max-height:200px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg3);margin-top:6px}
.exchange-select-item{display:flex;align-items:center;gap:10px;padding:9px 11px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s}
.exchange-select-item:last-child{border-bottom:none}
.exchange-select-item.selected{background:rgba(124,109,240,0.15);border-color:var(--accent)}
.exchange-select-item:active{background:var(--bg4)}
.exchange-selected-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;min-height:24px}
.exchange-tag{background:var(--bg3);border:1px solid var(--border2);border-radius:20px;padding:3px 10px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:5px}
.exchange-tag-x{cursor:pointer;color:var(--text3);font-size:14px;line-height:1}
.received-slot{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;margin-bottom:8px}
.received-slot-header{font-size:11px;font-weight:700;color:var(--text2);margin-bottom:8px}
/* PIN */
#pin-overlay{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px}
.pin-logo{font-size:32px;font-weight:800;letter-spacing:-1px}
.pin-logo span{color:var(--accent)}
.pin-dots{display:flex;gap:12px;margin:8px 0}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border2);background:transparent;transition:background .15s}
.pin-dot.filled{background:var(--accent);border-color:var(--accent)}
.pin-grid{display:grid;grid-template-columns:repeat(3,72px);gap:10px}
.pin-btn{width:72px;height:72px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-size:22px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .1s}
.pin-btn:active{background:var(--accent);color:#fff}
.pin-hint{font-size:12px;color:var(--text3)}
.pin-error{font-size:13px;color:var(--red);font-weight:600;min-height:18px}


.filters-row{display:flex;gap:6px;margin-top:8px;align-items:center;flex-wrap:wrap}
.plat-btn{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer;color:var(--text2);white-space:nowrap;transition:all .15s}
.plat-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.price-range{display:flex;align-items:center;gap:6px;margin-left:auto}
.price-inp{width:70px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:5px 8px;font-size:12px;outline:none;text-align:center}
.price-inp:focus{border-color:var(--accent)}
.price-sep{font-size:12px;color:var(--text3)}
.quick-price-btn{background:rgba(62,207,142,0.12);border:1px solid rgba(62,207,142,0.3);color:var(--green);border-radius:var(--radius-sm);padding:4px 10px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}

.source-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px}
.source-btn{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 4px;text-align:center;cursor:pointer;font-size:12px;font-weight:700;color:var(--text2);transition:all .15s}
.source-btn.sel{border-color:var(--accent);color:var(--accent);background:rgba(124,109,240,0.12)}
.slot-type-row{display:flex;gap:6px;margin-bottom:8px}
.slot-type-btn{flex:1;background:var(--bg3);border:1.5px solid var(--border2);border-radius:7px;padding:8px 4px;text-align:center;cursor:pointer;font-size:12px;font-weight:700;color:var(--text2);transition:all .15s}
.slot-type-btn.sel{border-color:var(--accent);color:#fff;background:var(--accent)}

.ship-src-switcher{display:flex;gap:6px;margin-bottom:12px}
.ship-src-btn{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 4px;font-size:13px;font-weight:700;cursor:pointer;color:var(--text2);text-align:center;transition:all .15s}
.ship-src-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.ship-badges{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.ship-badge{font-size:10px;font-weight:700;background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:2px 6px;color:var(--text2)}

.lang-grid{display:flex;flex-direction:column;gap:8px;margin-top:4px}
.lang-opt{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;transition:all .15s;user-select:none}
.lang-opt.sel{border-color:var(--accent);background:rgba(124,109,240,0.1)}
.lang-opt input[type=checkbox]{width:16px;height:16px;accent-color:var(--accent);cursor:pointer;flex-shrink:0}
.lang-opt-label{font-size:13px;font-weight:600;color:var(--text)}
.lang-opt.sel .lang-opt-label{color:var(--accent)}

#reserve-reminder{display:none;position:fixed;bottom:80px;left:12px;right:12px;background:var(--bg2);border:1.5px solid var(--amber);border-radius:var(--radius);padding:12px 14px;z-index:400;box-shadow:0 4px 20px rgba(0,0,0,0.4)}
#reserve-reminder.show{display:block}
.reserve-reminder-title{font-size:13px;font-weight:700;color:var(--amber);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.reserve-reminder-item{font-size:12px;color:var(--text);padding:5px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.reserve-reminder-item:last-child{border-bottom:none}
.reserve-reminder-close{position:absolute;top:8px;right:10px;background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;line-height:1}

/* Clients */
.client-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.client-name{font-size:15px;font-weight:700;margin-bottom:3px}
.client-meta{font-size:12px;color:var(--text2)}
.client-discount{background:rgba(124,109,240,0.15);border:1px solid var(--accent);border-radius:20px;padding:3px 10px;font-size:12px;font-weight:700;color:var(--accent);white-space:nowrap}
.client-actions{display:flex;gap:6px;margin-top:8px}
.client-btn{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:5px 10px;font-size:12px;cursor:pointer;color:var(--text2)}
.client-list-dropdown{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-sm);overflow:hidden;max-height:200px;overflow-y:auto;position:absolute;left:0;right:0;z-index:200;box-shadow:0 4px 16px rgba(0,0,0,0.4)}
.client-list-item{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s}
.client-list-item:last-child{border-bottom:none}
.client-list-item:active{background:var(--bg3)}
/* Wishlist */
.wish-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:13px;display:flex;align-items:center;gap:12px}
.wish-cover{width:44px;height:62px;object-fit:cover;border-radius:5px;background:var(--bg3);flex-shrink:0}
.wish-info{flex:1;min-width:0}
.wish-title{font-size:14px;font-weight:600;margin-bottom:3px}
.wish-meta{font-size:11px;color:var(--text2)}
.wish-actions{display:flex;gap:6px;flex-shrink:0}
.wish-btn{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 10px;font-size:12px;cursor:pointer;color:var(--text2)}
.wish-btn.found{background:rgba(62,207,142,0.1);border-color:var(--green);color:var(--green)}
/* Game stats */
.gstat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px;display:flex;align-items:center;gap:12px}
.gstat-cover{width:44px;height:62px;object-fit:cover;border-radius:5px;background:var(--bg3);flex-shrink:0}
.gstat-info{flex:1;min-width:0}
.gstat-title{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gstat-nums{display:flex;gap:8px;margin-top:5px;flex-wrap:wrap}
.gstat-num{font-size:11px;font-weight:700;background:var(--bg3);border-radius:5px;padding:2px 7px}

.genre-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.genre-opt{background:var(--bg3);border:1.5px solid var(--border);border-radius:20px;padding:5px 12px;cursor:pointer;font-size:11px;font-weight:700;color:var(--text2);transition:all .15s}
.genre-opt.sel{border-color:var(--pink,#ff006e);color:var(--pink,#ff006e);background:rgba(255,0,110,0.1)}

.order-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.order-card.new-order{border-color:rgba(0,212,255,0.4)}
.order-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:8px;flex-wrap:wrap}
.order-status{font-size:10px;font-weight:700;border-radius:20px;padding:3px 10px;border:1px solid}
.order-status.new{color:#00d4ff;border-color:rgba(0,212,255,0.4);background:rgba(0,212,255,0.08)}
.order-status.confirmed{color:#00ff88;border-color:rgba(0,255,136,0.3)}
.order-status.delivered{color:var(--text3);border-color:var(--border)}
.order-status.cancelled{color:var(--red,#f06060);border-color:rgba(240,96,96,0.3)}
.order-items{background:var(--bg3);border-radius:var(--radius-sm);padding:10px;margin:8px 0;font-size:12px}
.order-item-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--border)}
.order-item-row:last-child{border-bottom:none;font-weight:700;color:var(--green);padding-top:6px}
.order-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.order-action-btn{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text2);font-size:11px;font-weight:600;padding:6px 12px;cursor:pointer;transition:all .15s;text-decoration:none;display:inline-flex;align-items:center;gap:4px}
.order-action-btn.confirm{border-color:rgba(0,255,136,0.3);color:#00ff88}
.order-action-btn.cancel{border-color:rgba(240,96,96,0.3);color:#f06060}
.order-action-btn.deliver{border-color:rgba(0,212,255,0.3);color:#00d4ff}

.loyalty-row{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.loyalty-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#0088ff);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;color:#fff;flex-shrink:0}
.loyalty-info{flex:1;min-width:0}
.loyalty-name{font-size:14px;font-weight:700;margin-bottom:2px}
.loyalty-email{font-size:11px;color:var(--text2)}
.loyalty-stats{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.loyalty-stat{text-align:center}
.loyalty-stat-val{font-family:monospace;font-size:14px;font-weight:700;color:var(--cyan)}
.loyalty-stat-label{font-size:9px;color:var(--text3);letter-spacing:.5px}
.loyalty-pct-badge{font-family:var(--font-display,monospace);font-size:13px;font-weight:700;border-radius:20px;padding:4px 12px;border:1px solid}
.loyalty-pct-badge.p0{color:#888;border-color:rgba(136,136,136,0.3)}
.loyalty-pct-badge.p3{color:#cd7f32;border-color:rgba(205,127,50,0.4)}
.loyalty-pct-badge.p5{color:#aaa;border-color:rgba(170,170,170,0.4)}
.loyalty-pct-badge.p7{color:#ffd700;border-color:rgba(255,215,0,0.4)}
.loyalty-pct-badge.p10{color:#00d4ff;border-color:rgba(0,212,255,0.4)}
.loyalty-actions{display:flex;gap:6px}
.loyalty-action-btn{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text2);font-size:11px;padding:5px 10px;cursor:pointer;transition:all .15s}
.loyalty-action-btn:hover{border-color:var(--accent);color:var(--accent)}
</style>
</head>
<body>
<div id="loader"><div class="loader-logo"><span>ND</span> Games</div><div class="loader-dots"><i></i><i></i><i></i></div></div>

<div id="root" style="display:none">
  <div class="tab-bar">
    <button class="tab active" id="tab-available" onclick="setPage('available')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg><span id="tl-available">available</span></button>
    <button class="tab" id="tab-transit" onclick="setPage('transit')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M5 17H3a2 2 0 01-2-2V5a2 2 0 012-2h11a2 2 0 012 2v3"/><rect x="9" y="11" width="14" height="10" rx="2"/><circle cx="12" cy="21" r="1"/><circle cx="20" cy="21" r="1"/></svg><span id="tl-transit">transit</span></button>
    <button class="tab" id="tab-reserved" onclick="setPage('reserved')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg><span id="tl-reserved">reserved</span></button>
    <button class="tab" id="tab-sold" onclick="setPage('sold')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M20 7H4a2 2 0 00-2 2v6a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z"/><path d="M16 12h.01"/></svg><span id="tl-sold">sold</span></button>

    <button class="tab" id="tab-shipments" onclick="setPage('shipments')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/></svg><span id="tl-shipments">shipments</span></button>
    <button class="tab" id="tab-stats" onclick="setPage('stats')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M18 20V10M12 20V4M6 20v-6"/></svg><span id="tl-stats">stats</span></button>
    <button class="tab" id="tab-calc" onclick="setPage('calc')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="4" y="2" width="16" height="20" rx="2"/><path d="M8 6h8M8 10h8M8 14h4"/></svg><span id="tl-calc">calc</span></button>
    <button class="tab" id="tab-clients" onclick="setPage('clients')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg><span id="tl-clients">Клиенты</span></button>

// PIN PROTECTION
var pinInput='';
function pinKey(k){
  var stored=localStorage.getItem('nd-pin')||'1234';
  if(k==='del'){
    pinInput=pinInput.slice(0,-1);
  } else if(k==='ok'){
    if(pinInput===stored){
      document.getElementById('pin-overlay').style.display='none';
      pinInput='';
    } else {
      document.getElementById('pin-error').textContent='\u041d\u0435\u0432\u0435\u0440\u043d\u044b\u0439 PIN';
      pinInput='';
      setTimeout(function(){var e=document.getElementById('pin-error');if(e)e.textContent='';},1500);
    }
  } else {
    if(pinInput.length<4) pinInput+=k;
    if(pinInput.length===4){
      if(pinInput===stored){
        document.getElementById('pin-overlay').style.display='none';
        pinInput='';
        for(var j=0;j<4;j++){var dj=document.getElementById('pd'+j);if(dj)dj.classList.remove('filled');}
        return;
      } else {
        document.getElementById('pin-error').textContent='\u041d\u0435\u0432\u0435\u0440\u043d\u044b\u0439 PIN';
        pinInput='';
        setTimeout(function(){var e=document.getElementById('pin-error');if(e)e.textContent='';},1500);
      }
    }
  }
  for(var i=0;i<4;i++){var d=document.getElementById('pd'+i);if(d)d.classList.toggle('filled',i<pinInput.length);}
}
var storedPin=localStorage.getItem('nd-pin');
if(!storedPin){
  localStorage.setItem('nd-pin','1234');
  var hint=document.getElementById('pin-hint');
  if(hint)hint.textContent='\u0414\u0435\u0444\u043e\u043b\u0442: 1234';
}

function openChangePin(){
    document.getElementById('modal-root').innerHTML=
    '<div class="modal-overlay" onclick="closeModal(event)"><div class="modal" onclick="event.stopPropagation()">'
    +'<div class="modal-handle"></div>'
    +'<div class="modal-title">\u0421\u043c\u0435\u043d\u0430 PIN <button class="btn-close" onclick="closeModalForce()">\xd7</button></div>'
    +'<div class="field"><label>\u0422\u0435\u043a\u0443\u0449\u0438\u0439 PIN</label><input id="cp-old" type="password" inputmode="numeric" maxlength="4" placeholder="\u2022\u2022\u2022\u2022" style="letter-spacing:8px;font-size:20px;text-align:center"></div>'
    +'<div class="field"><label>\u041d\u043e\u0432\u044b\u0439 PIN (4 \u0446\u0438\u0444\u0440\u044b)</label><input id="cp-new" type="password" inputmode="numeric" maxlength="4" placeholder="\u2022\u2022\u2022\u2022" style="letter-spacing:8px;font-size:20px;text-align:center"></div>'
    +'<div class="field"><label>\u041f\u043e\u0432\u0442\u043e\u0440\u0438\u0442\u0435 \u043d\u043e\u0432\u044b\u0439 PIN</label><input id="cp-confirm" type="password" inputmode="numeric" maxlength="4" placeholder="\u2022\u2022\u2022\u2022" style="letter-spacing:8px;font-size:20px;text-align:center"></div>'
    +'<div id="cp-error" style="color:var(--red);font-size:13px;margin-bottom:8px;min-height:18px"></div>'
    +'<button class="btn-primary" onclick="saveNewPin()">\u0421\u043e\u0445\u0440\u0430\u043d\u0438\u0442\u044c PIN</button>'
    +'</div></div>';
}

function saveNewPin(){
  var oldVal=document.getElementById('cp-old').value;
  var newVal=document.getElementById('cp-new').value;
  var confirmVal=document.getElementById('cp-confirm').value;
  var stored=localStorage.getItem('nd-pin')||'1234';
  var errEl=document.getElementById('cp-error');
  if(oldVal!==stored){if(errEl)errEl.textContent='\u041d\u0435\u0432\u0435\u0440\u043d\u044b\u0439 \u0442\u0435\u043a\u0443\u0449\u0438\u0439 PIN';return;}
  if(newVal.length!==4){if(errEl)errEl.textContent='PIN \u0434\u043e\u043b\u0436\u0435\u043d \u0431\u044b\u0442\u044c \u0438\u0437 4 \u0446\u0438\u0444\u0440';return;}
  if(newVal!==confirmVal){if(errEl)errEl.textContent='PIN \u043d\u0435 \u0441\u043e\u0432\u043f\u0430\u0434\u0430\u0435\u0442';return;}
  localStorage.setItem('nd-pin',newVal);
  closeModalForce();
  showToast('\u2713 PIN \u0438\u0437\u043c\u0435\u043d\u0451\u043d');
}

async function getIGDBToken(){
  if(_igdbToken&&Date.now()<_igdbTokenExp)return _igdbToken;
  try{
    var r=await fetch('https://id.twitch.tv/oauth2/token?client_id='+IGDB_CLIENT_ID+'&client_secret='+IGDB_CLIENT_SECRET+'&grant_type=client_credentials',{method:'POST'});
    var d=await r.json();
    _igdbToken=d.access_token;
    _igdbTokenExp=Date.now()+(d.expires_in-60)*1000;
    return _igdbToken;
  }catch(e){return null;}
}

async function searchIGDB(q,pageSize){
  pageSize=pageSize||6;
  try{
    var r=await fetch('https://igdbproxy.mrdarkers980.workers.dev/?q='+encodeURIComponent(q),{
      method:'GET',
      headers:{'X-Source':'sgdb'}
    });
    var results=await r.json();
    if(!Array.isArray(results))return[];
    return results;
  }catch(e){return[];}
}

// HELPERS
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function showToast(msg){var el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(function(){el.classList.remove('show');},2400);}
function gel(a,c){var rates={'\u20be':1,'$':2.7,'\u20ac':2.95};return parseFloat(a||0)*(rates[c]||1);}
function calcProfit(g){
  var price=parseFloat(g.price||0);if(!price)return null;
  var cost=g.cost?gel(g.cost,g.costCurrency||'\u20be'):0;
  var delC=parseFloat(g.deliveryCost||0);
  var shipC=g.shipmentId&&S.shipments[g.shipmentId]?parseFloat(S.shipments[g.shipmentId].perDisc||0):0;
  if(!g.cost)return price;
  return price-(cost+delC+shipC);
}
function fmtDate(ts){
  if(!ts)return'';
  var d=new Date(ts),now=new Date();
  var time=d.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
  if(d.toDateString()===now.toDateString())return time;
  if(d.toDateString()===new Date(now-86400000).toDateString())return(lang==='ka'?'\u10d2\u10e3\u10e8\u10d8\u10dc':'\u0432\u0447\u0435\u0440\u0430')+' '+time;
  return d.toLocaleDateString('ru-RU',{day:'numeric',month:'short'})+' '+time;
}
function makeCover(cover){
  if(cover)return '<img src="'+cover+'" alt="" loading="lazy" onerror="this.style.display=\'none\'">';
  return '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>';
}

// STATS BAR (filtered by current item type)
function renderStats(){
  var g=Object.values(S.games).filter(function(x){return (x.itemType||'disc')===S.itemType;}),c={total:0,av:0,tr:0,sold:0};
  g.forEach(function(x){var q=parseInt(x.qty||1);c.total+=q;if(x.status==='available')c.av+=q;if(['transit','ordered'].includes(x.status))c.tr+=q;if(x.status==='sold')c.sold++;});
  var r=document.getElementById('stats-row');if(!r)return;
  r.innerHTML='<div class="stat" onclick="setPage(\'available\')"><div class="stat-num">'+c.total+'</div><div class="stat-lbl">'+t('total')+'</div></div>'
    +'<div class="stat" onclick="setPage(\'available\')"><div class="stat-num" style="color:var(--green)">'+c.av+'</div><div class="stat-lbl">'+t('instock')+'</div></div>'
    +'<div class="stat" onclick="setPage(\'transit\')"><div class="stat-num" style="color:var(--blue)">'+c.tr+'</div><div class="stat-lbl">'+t('transit_c')+'</div></div>'
    +'<div class="stat" onclick="setPage(\'sold\')"><div class="stat-num" style="color:var(--red)">'+c.sold+'</div><div class="stat-lbl">'+t('sold_s')+'</div></div>';
}

// RENDER GAME LIST (grouped by title, filtered by item type)
function renderList(){
  renderStats();
  var q=(document.getElementById('search-inp')||{}).value||'';
  ['available','transit','reserved','sold','exchange'].forEach(function(pid){
    var g=Object.entries(S.games).map(function(e){return Object.assign({},e[1],{id:e[0]});}).filter(function(x){
      if(!PAGE_ST[pid].includes(x.status))return false;
      if((x.itemType||'disc')!==S.itemType)return false;
      // Platform filter
      if(S.filterPlat!=='all'){
        var xp=x.platform||'';
        if(S.filterPlat==='PS5'&&!xp.includes('PS5'))return false;
        if(S.filterPlat==='PS4'&&!xp.includes('PS4'))return false;
      }
      // Condition filter
      if(S.filterCond!=='all'&&x.condition!==S.filterCond)return false;
      // Price filter
      var pmin=parseFloat((document.getElementById('pf-min')||{}).value||'');
      var pmax=parseFloat((document.getElementById('pf-max')||{}).value||'');
      var xprice=parseFloat(x.price||0);
      if(!isNaN(pmin)&&pmin>0&&xprice<pmin)return false;
      if(!isNaN(pmax)&&pmax>0&&xprice>pmax)return false;
      return true;
    });
    if(q)g=g.filter(function(x){return x.title&&x.title.toLowerCase().includes(q.toLowerCase());});
    if(S.sortOrder==='alpha'){
      g.sort(function(a,b){return (a.title||'').localeCompare(b.title||'','ru',{sensitivity:'base'});});
    } else {
      g.sort(function(a,b){return (b.addedAt||0)-(a.addedAt||0);});
    }
    var grid=document.getElementById('grid-'+pid);if(!grid)return;
    if(!g.length){
      var noItemsLabel=S.itemType==='disc'?t('no_discs'):S.itemType==='steelbook'?(lang==='ka'?'\u10e1\u10e2\u10d8\u10da\u10d1\u10e3\u10d9\u10d8 \u10d0\u10e0 \u10d0\u10e0\u10d8\u10e1':'\u041d\u0435\u0442 \u0441\u0442\u0438\u043b\u0431\u0443\u043a\u043e\u0432'):(lang==='ka'?'\u10d0\u10d9\u10e1\u10d4\u10e1\u10e3\u10d0\u10e0\u10d8 \u10d0\u10e0 \u10d0\u10e0\u10d8\u10e1':'\u041d\u0435\u0442 \u0430\u043a\u0441\u0435\u0441\u0441\u0443\u0430\u0440\u043e\u0432');
      grid.innerHTML='<div class="empty-state"><p style="margin-top:10px">'+noItemsLabel+'</p></div>';
      return;
    }
    // Group by title
    var groups={};
    g.forEach(function(x){
      var key=((x.title||'').toLowerCase().trim().replace(/\s+/g,' ')||x.id)+'|'+(x.platform||'');
      if(!groups[key]){groups[key]={items:[],cover:x.cover||'',title:x.title||'\u2014',latestAt:0};}
      groups[key].items.push(x);
      if((x.addedAt||0)>groups[key].latestAt){groups[key].latestAt=x.addedAt||0;if(x.cover)groups[key].cover=x.cover;}
    });
    var cards=Object.values(groups);
    if(S.sortOrder==='alpha'){
      cards.sort(function(a,b){return (a.title||'').localeCompare(b.title||'','ru',{sensitivity:'base'});});
    } else {
      cards.sort(function(a,b){return b.latestAt-a.latestAt;});
    }
    grid.innerHTML=cards.map(function(grp){
      var items=grp.items;
      if(items.length===1){
        var x=items[0];
        var st=STATUSES[x.status]||STATUSES.available;
        var qty=parseInt(x.qty||1);
        var qtyBadge=qty>1?'<div class="qty-badge">\xd7'+qty+'</div>':'';
        var condBadge=x.condition?'<div class="cond-badge '+(x.condition==='new'?'cond-new':'cond-used')+'">'+(x.condition==='new'?t('cond_new'):t('cond_used'))+'</div>':'';
        var profit=calcProfit(x);
        var profHtml=profit!==null?'<div class="game-profit" style="color:'+(profit>=0?'var(--green)':'var(--red)')+'">'+(profit>=0?'+':'')+profit.toFixed(0)+' \u20be</div>':'';
        var perHtml=x.person?'<div class="game-person">\ud83d\udc64 '+x.person+'</div>':'';
        var tsLabel='',tsVal=0;
        if(x.status==='sold'&&x.soldAt){tsLabel=t('sold_at');tsVal=x.soldAt;}
        else if(x.status==='exchange'&&x.exchangedAt){tsLabel=t('exchanged_at');tsVal=x.exchangedAt;}
        else if(x.addedAt){tsLabel=t('added_at');tsVal=x.addedAt;}
        var timeHtml=tsVal?'<div class="game-time">\u23f0 '+tsLabel+' '+fmtDate(tsVal)+'</div>':'';
        var hasGameHtml=(x.itemType==='steelbook'&&x.hasGame===false)?'<div style="font-size:10px;color:var(--amber);font-weight:700;margin-top:2px">'+(lang==='ka'?'\u10ea\u10d0\u10e0\u10d8\u10d4\u10d4\u10d8':'\u041f\u0443\u0441\u0442\u043e\u0439')+'</div>':'';
        return '<div class="game-card" onclick="openDetail(\''+x.id+'\')"><div class="game-cover">'+makeCover(grp.cover)+qtyBadge+condBadge+'</div>'
          +'<div class="game-body"><div><div class="game-title">'+(x.title||'\u2014')+'</div>'
          +'<div class="game-meta">'+(x.platform||'PS4/PS5')+(x.region?' \xb7 '+x.region:'')+'</div>'+hasGameHtml+'</div><div>'
          +'<div class="game-row"><div><div class="game-price">'+(x.price?x.price+' \u20be':'\u2014')+'</div>'+profHtml+'</div>'
          +'<span class="badge '+st.badge+'">'+t('st_'+x.status)+'</span></div>'+perHtml+timeHtml+'</div></div></div>';
      }
      var totalQty=0,minPrice=null,maxPrice=null,breakdown={};
      items.forEach(function(x){
        var qty=parseInt(x.qty||1);totalQty+=qty;
        var p=parseFloat(x.price||0);
        if(p>0){if(minPrice===null||p<minPrice)minPrice=p;if(maxPrice===null||p>maxPrice)maxPrice=p;}
        var bk=(x.platform||'')+'|'+(x.condition||'');
        if(!breakdown[bk])breakdown[bk]={platform:x.platform||'',condition:x.condition||'',qty:0};
        breakdown[bk].qty+=qty;
      });
      var bdTags='';
      Object.values(breakdown).forEach(function(b){
        var cL=b.condition?' '+(b.condition==='new'?t('cond_new'):t('cond_used')):'';
        bdTags+='<span style="font-size:10px;font-weight:700;background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:2px 5px;margin-right:3px;white-space:nowrap">'+b.platform+cL+' \xd7'+b.qty+'</span>';
      });
      var priceStr=minPrice!==null?(minPrice===maxPrice?minPrice+' \u20be':minPrice+'\u2013'+maxPrice+' \u20be'):'\u2014';
      var itemsList='';
      items.forEach(function(x){
        var st=STATUSES[x.status]||STATUSES.available;
        var qty=parseInt(x.qty||1);
        var cL=x.condition?' \xb7 '+(x.condition==='new'?t('cond_new'):t('cond_used')):'';
        itemsList+='<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-top:1px solid var(--border);cursor:pointer" onclick="event.stopPropagation();openDetail(\''+x.id+'\')">'
          +'<span style="font-size:12px;color:var(--text2)">'+(x.platform||'')+cL+(qty>1?' \xd7'+qty:'')+'</span>'
          +'<div style="display:flex;align-items:center;gap:6px">'+(x.price?'<span style="font-size:12px;font-weight:700">'+x.price+' \u20be</span>':'')
          +'<span class="badge '+st.badge+'" style="font-size:9px">'+t('st_'+x.status)+'</span></div></div>';
      });
      return '<div class="game-card" style="flex-direction:column;cursor:default"><div style="display:flex">'
        +'<div class="game-cover">'+makeCover(grp.cover)+'<div class="qty-badge">\xd7'+totalQty+'</div></div>'
        +'<div class="game-body"><div><div class="game-title">'+grp.title+'</div>'
        +'<div style="margin-top:5px;display:flex;flex-wrap:wrap;gap:2px">'+bdTags+'</div></div>'
        +'<div class="game-price" style="margin-top:6px">'+priceStr+'</div></div></div>'
        +'<div style="padding:0 11px 8px">'+itemsList+'</div></div>';
    }).join('');
  });
}

function onTitleInput(val){
  clearTimeout(S.suggTimer);
  var curType=_editItemType||S.itemType;
  if(curType==='accessory'){document.getElementById('suggest-box').innerHTML='';var h=document.getElementById('cover-hint');if(h)h.textContent='';return;}
  if(!val||val.length<2){document.getElementById('suggest-box').innerHTML='';return;}
  document.getElementById('cover-hint').textContent=t('searching');
  S.suggTimer=setTimeout(function(){fetchSugg(val);},600);
}
async function fetchSugg(q){
  try{
    var results=await searchIGDB(q,6);
    S.sugg=results;
    var h=document.getElementById('cover-hint');if(h)h.textContent='';
    var box=document.getElementById('suggest-box');if(!box)return;
    if(!S.sugg.length){box.innerHTML='';return;}
    var html='<div class="suggest-list">';
    S.sugg.forEach(function(g,i){
      html+='<div class="suggest-item" onclick="selectSugg('+i+')">';
      html+=g.cover?'<img class="sug-thumb" src="'+g.cover+'" alt="" loading="lazy">':'<div class="sug-thumb"></div>';
      html+='<div><div class="sug-name">'+g.name+'</div></div></div>';
    });
    html+='</div>';
    box.innerHTML=html;
  }catch(e){
    var h=document.getElementById('cover-hint');if(h)h.textContent=t('no_conn');
    var b=document.getElementById('suggest-box');if(b)b.innerHTML='';
  }
}
function selectSugg(i){
  var g=S.sugg[i];if(!g)return;
  var ti=document.getElementById('inp-title');if(ti)ti.value=g.name;
  var ci=document.getElementById('inp-cover');if(ci)ci.value=g.cover||'';
  var h=document.getElementById('cover-hint');if(h)h.textContent=g.cover?t('cover_found'):'';
  document.getElementById('suggest-box').innerHTML='';
}

function addGame(){
  var d=getForm();if(!d.title){showToast(t('game_name'));return;}
  var id=uid();
  var isRes=d.status==='reserved'||d.status==='reserved_exchange';
  var data=Object.assign({},d,{id:id,addedAt:Date.now(),soldAt:null,exchangedAt:null,reservedAt:isRes?Date.now():null});
  Object.keys(data).forEach(function(k){if(data[k]===undefined)delete data[k];});
  db.ref('games/'+id).set(data);
  // Auto-create expense for cost if specified and no shipment
  var _cost=parseFloat(d.cost||0);
  var _cur=d.costCurrency||'₾';
  var _costGel=_cost>0?gel(String(_cost),_cur):0;
  if(_costGel>0&&!d.shipmentId){
    var eid=uid();
    db.ref('expenses/'+eid).set({id:eid,name:d.title,to:'Закупка',amount:_costGel,date:Date.now(),type:'purchase',gameId:id});
  }
  showToast(t('disc_added'));closeModalForce();
}
function saveEdit(id){
  var d=getForm();if(!d.title){showToast(t('game_name'));return;}
  var prev=S.games[id]||{};
  var data=Object.assign({},d,{soldAt:d.status==='sold'?(prev.soldAt||Date.now()):null,exchangedAt:d.status==='exchange'?(prev.exchangedAt||Date.now()):null,reservedAt:(d.status==='reserved'||d.status==='reserved_exchange')?(prev.reservedAt||Date.now()):null});
  Object.keys(data).forEach(function(k){if(data[k]===undefined)delete data[k];});
  db.ref('games/'+id).update(data);
  // Update or create expense for cost if no shipment
  if(!d.shipmentId){
    // Find existing purchase expense for this game
    var existingExp=Object.values(S.expenses).find(function(e){return e.gameId===id&&e.type==='purchase';});
    if(d.cost&&parseFloat(d.cost)>0){
      var costGel=gel(String(parseFloat(d.cost||0)),d.costCurrency||'₾');
      if(existingExp){
        db.ref('expenses/'+existingExp.id).update({amount:costGel,name:d.title});
      } else {
        var eid=uid();
        db.ref('expenses/'+eid).set({id:eid,name:d.title,to:(lang==='ka'?'დისკის გადახდა':'Закупка диска'),amount:costGel,date:prev.addedAt||Date.now(),type:'purchase',gameId:id});
      }
    } else if(existingExp){
      // Cost removed - delete the expense
      db.ref('expenses/'+existingExp.id).remove();
    }
  }
  showToast(t('saved'));closeModalForce();
}
function deleteGame(id){
  if(!confirm(t('del_disc')))return;
  // Remove associated purchase expense if exists
  Object.values(S.expenses).forEach(function(e){

function saveQuickPrice(){

function quickStatus(id,status){
  if(status==='sold'){var g=S.games[id];if(g&&parseInt(g.qty||1)>1)openSellOnePopup(id);else openSellPopup(id);}
  else{db.ref('games/'+id).update({status:status,soldAt:null,exchangedAt:status==='exchange'?Date.now():null,reservedAt:(status==='reserved'||status==='reserved_exchange')?Date.now():null});showToast(t('status_changed'));closeModalForce();}
}
function openSellOnePopup(id){
  var g=S.games[id];if(!g)return;closeModalForce();
  var rem=parseInt(g.qty||1)-1;
  document.getElementById('modal-root').innerHTML='<div class="modal-overlay" onclick="closeModal(event)"><div class="sell-popup" onclick="event.stopPropagation()"><div class="modal-handle"></div><h3>'+t('sell_title')+'</h3><p>'+t('sell_sub')+' \xb7 '+( lang==='ka'?'\u10e0\u10e9\u10d4\u10d1\u10d0':'\u041e\u0441\u0442\u0430\u0442\u043e\u043a')+': '+rem+' '+t('discs')+'</p><div class="sell-input-wrap"><input id="sell-price-inp" type="number" value="'+(g.price||'')+'" placeholder="0"><span>\u20be</span></div><button class="btn-primary" onclick="confirmSellOne(\''+id+'\')">'+t('sell_confirm')+'</button><button class="btn-secondary" onclick="closeModalForce()">'+t('sell_cancel')+'</button></div></div>';
  setTimeout(function(){var inp=document.getElementById('sell-price-inp');if(inp){inp.focus();inp.select();}},100);
}
function confirmSellOne(id){
  var g=S.games[id];if(!g)return;
  var inp=document.getElementById('sell-price-inp'),price=inp?inp.value:g.price||'';
  var newQty=parseInt(g.qty||1)-1;
  if(newQty<=0){db.ref('games/'+id).update({status:'sold',price:price,soldAt:Date.now(),qty:0});}
  else{db.ref('games/'+id).update({qty:newQty});var sid=uid();db.ref('games/'+sid).set(Object.assign({},g,{id:sid,qty:1,status:'sold',price:price,soldAt:Date.now()}));}
  showToast(t('sold_ok'));closeModalForce();
}
function openSellPopup(id){
  var g=S.games[id];if(!g)return;closeModalForce();
  document.getElementById('modal-root').innerHTML='<div class="modal-overlay" onclick="closeModal(event)"><div class="sell-popup" onclick="event.stopPropagation()"><div class="modal-handle"></div><h3>'+t('sell_title')+'</h3><p>'+t('sell_sub')+'</p><div class="sell-input-wrap"><input id="sell-price-inp" type="number" value="'+(g.price||'')+'" placeholder="0"><span>\u20be</span></div><button class="btn-primary" onclick="confirmSell(\''+id+'\')">'+t('sell_confirm')+'</button><button class="btn-secondary" onclick="closeModalForce()">'+t('sell_cancel')+'</button></div></div>';
  setTimeout(function(){var inp=document.getElementById('sell-price-inp');if(inp){inp.focus();inp.select();}},100);
}
function confirmSell(id){
  var inp=document.getElementById('sell-price-inp'),price=inp?inp.value:(S.games[id]&&S.games[id].price)||'';
  db.ref('games/'+id).update({status:'sold',price:price,soldAt:Date.now()});
  showToast(t('sold_ok'));closeModalForce();
}

// SHIPMENTS (filtered by item type, with auto-expense and auto-receive)
function srcLabel(src){
  if(src==='Georgia')return lang==='ka'?'საქართველო':'Грузия';
  if(src==='USA')return lang==='ka'?'აშშ':'США';
  if(src==='Dubai')return 'Dubai';
  return src||'';
}

function renderShipments(){
  var page=document.getElementById('page-shipments');if(!page||S.page!=='shipments')return;
  var allShips=Object.entries(S.shipments).map(function(e){return Object.assign({},e[1],{id:e[0]});}).sort(function(a,b){return (b.date||0)-(a.date||0);});
  var ships=S.filterShipSrc==='all'?allShips:allShips.filter(function(s){return s.source===S.filterShipSrc;});

  var srcSwitcher='<div class="ship-src-switcher">'
    +'<button class="ship-src-btn'+(S.filterShipSrc==='all'?' active':'')+'" onclick="setShipSrcFilter(\'all\')">'+(lang==='ka'?'\u10e7\u10d5\u10d4\u10da\u10d0':'\u0412\u0441\u0435')+'</button>'
    +'<button class="ship-src-btn'+(S.filterShipSrc==='Georgia'?' active':'')+'" onclick="setShipSrcFilter(\'Georgia\')">'+(lang==='ka'?'\u10e1\u10d0\u10e5\u10d0\u10e0\u10d7\u10d5\u10d4\u10da\u10dd':'\u0413\u0440\u0443\u0437\u0438\u044f')+'</button>'
    +'<button class="ship-src-btn'+(S.filterShipSrc==='USA'?' active':'')+'" onclick="setShipSrcFilter(\'USA\')">'+(lang==='ka'?'\u10d0\u10e8\u10e8':'\u0421\u0428\u0410')+'</button>'
    +'<button class="ship-src-btn'+(S.filterShipSrc==='Dubai'?' active':'')+'" onclick="setShipSrcFilter(\'Dubai\')">Dubai</button>'
    +'</div>';

  var exportBtn=S.filterShipSrc!=='all'?('<button onclick="exportShipmentsExcel(\''+S.filterShipSrc+'\')" style="width:100%;background:rgba(62,207,142,0.1);border:1px solid rgba(62,207,142,0.3);color:var(--green);border-radius:var(--radius-sm);padding:9px;font-size:13px;font-weight:700;cursor:pointer;margin-bottom:12px;display:flex;align-items:center;justify-content:center;gap:6px"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>'+(lang==='ka'?'\u10d4\u10e5\u10e1\u10de\u10dd\u10e0\u10e2\u10d8 Excel \u2014 '+srcLabel(S.filterShipSrc):'\u042d\u043a\u0441\u043f\u043e\u0440\u0442 Excel \u2014 '+srcLabel(S.filterShipSrc))+'</button>'):'';

  var cardsHtml=!ships.length?'<div style="color:var(--text3);font-size:14px;text-align:center;padding:40px 0;grid-column:1/-1">'+t('no_ships')+'</div>'
    :ships.map(function(s){
      var isT=s.shipStatus!=='received';
      var purchase=parseFloat(s.purchaseCost||0),delivery=parseFloat(s.deliveryCostVal||0),total=purchase+delivery;
      var count=parseInt(s.discCount)||1,perDisc=count>0?total/count:0;
      // Count items by type from linked games
      var linkedGames=Object.values(S.games).filter(function(g){return g.shipmentId===s.id;});
      var typeCounts={disc:0,steelbook:0,accessory:0};
      linkedGames.forEach(function(g){
        var tp=g.itemType||'disc';
        typeCounts[tp]=(typeCounts[tp]||0)+(parseInt(g.qty)||1);
      });
      var badgesHtml='<div class="ship-badges">';
      if(typeCounts.disc>0)badgesHtml+='<span class="ship-badge">\ud83d\udcbf \xd7'+typeCounts.disc+'</span>';
      if(typeCounts.steelbook>0)badgesHtml+='<span class="ship-badge">\ud83d\udce6 \xd7'+typeCounts.steelbook+'</span>';
      if(typeCounts.accessory>0)badgesHtml+='<span class="ship-badge">\ud83c\udfa8 \xd7'+typeCounts.accessory+'</span>';
      badgesHtml+='</div>';
      return '<div class="ship-card">'
        +'<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">'
        +'<div><div class="ship-name">'+(s.name||t('new_ship'))+'</div>'
        +'<div class="ship-date">'+srcLabel(s.source)+' \xb7 '+(s.date?new Date(s.date).toLocaleDateString('ru-RU'):'')+'</div>'+badgesHtml+'</div>'
        +'<div style="text-align:right"><div class="ship-cost">'+total.toFixed(2)+' \u20be</div>'
        +'<div class="ship-per">'+(perDisc>0?'~'+perDisc.toFixed(2)+' '+t('per_disc'):'\u2014')+'</div></div></div>'
        +'<div class="ship-status-row">'
        +'<div class="ship-status-btn'+(isT?' active-transit':'')+'" onclick="setShipStatus(\''+s.id+'\',\'transit\')">\ud83d\ude9a '+t('ship_transit')+'</div>'
        +'<div class="ship-status-btn'+(!isT?' active-received':'')+'" onclick="setShipStatus(\''+s.id+'\',\'received\')">\u2713 '+t('ship_received')+'</div></div>'
        +'<div style="font-size:12px;color:var(--text2);margin-top:4px">'+count+' '+t('discs')+' \xb7 '+t('purchase_c')+': '+purchase.toFixed(2)+'\u20be \xb7 '+t('delivery_c')+': '+delivery.toFixed(2)+'\u20be</div>'

        +'<button onclick="openEditShipment(\''+s.id+'\')" style="flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text2);padding:6px;font-size:12px;cursor:pointer">\u270f\ufe0f '+t('edit_btn')+'</button>'
        +'<button onclick="deleteShipment(\''+s.id+'\')" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:12px;padding:6px">'+t('del')+'</button>'
        +'</div></div>';
    }).join('');
  page.innerHTML='<button class="btn-new-ship" onclick="openAddShipment()">+ '+t('new_ship')+'</button>'+srcSwitcher+exportBtn+'<div class="ship-grid">'+cardsHtml+'</div>';
}

function setShipSrcFilter(src){
  S.filterShipSrc=src;
  renderShipments();
}

function setShipStatus(id,status){
  db.ref('shipments/'+id).update({shipStatus:status});
  if(status==='received'){
    Object.entries(S.games).forEach(function(e){
      var gid=e[0],g=e[1];
      if(g.shipmentId===id&&(g.status==='transit'||g.status==='ordered')){
        db.ref('games/'+gid).update({status:'available'});
      }
    });
    showToast(t('received_msg'));
  } else {
    showToast(t('saved'));
  }
}

function openAddShipment(){S.editShipId=null;S.shipSlots=1;S.slotData={};openShipModal();}
function openEditShipment(id){
  var ex=S.shipments[id]||{};
  S.editShipId=id;
  var count=parseInt(ex.discCount)||1;
  S.shipSlots=count;
  S.slotData={};
  var linked=Object.values(S.games)
    .filter(function(g){return g.shipmentId===id;})
    .sort(function(a,b){return (a.addedAt||0)-(b.addedAt||0);});
  linked.forEach(function(g,i){
    if(i<count){
      S.slotData[i]={title:g.title||'',cover:g.cover||'',plat:g.platform||'PS5',cond:g.condition||'used',qty:parseInt(g.qty)||1,itemType:g.itemType||'disc'};
    }
  });
  openShipModal();
}

function setSlotType(i,tp){
  saveSlotData();
  if(!S.slotData[i])S.slotData[i]={};
  S.slotData[i].itemType=tp;
  var container=document.getElementById('ship-slots');if(!container)return;
  var html='';for(var k=0;k<S.shipSlots;k++)html+=buildSlotHtml(k);
  container.innerHTML=html;

function openShipModal(){
  var ex=S.editShipId?(S.shipments[S.editShipId]||{}):{};
  var n=S.shipSlots;

var slotTimers={};
function onSlotInput(idx,val){
  clearTimeout(slotTimers[idx]);
  var box=document.getElementById('slot-sugg-'+idx);
  var slot=document.getElementById('slot-'+idx);
  var slotType=slot&&slot.querySelector('.slot-itemtype')?slot.querySelector('.slot-itemtype').value:'disc';
  if(slotType==='accessory'){if(box)box.innerHTML='';return;}
  if(!val||val.length<2){if(box)box.innerHTML='';return;}
  slotTimers[idx]=setTimeout(function(){fetchSlotSugg(idx,val);},600);
}

async function fetchSlotSugg(idx,q){
  try{
    var results=await searchIGDB(q,5);
    var box=document.getElementById('slot-sugg-'+idx);if(!box)return;
    if(!results.length){box.innerHTML='';return;}
    var html='<div class="slot-sugg-box">';
    results.forEach(function(g){
      var sn=g.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      var sc=(g.cover||'').replace(/'/g,"\\'");
      html+='<div class="slot-sugg-item" onclick="selectSlotSugg('+idx+',&quot;'+sn+'&quot;,&quot;'+sc+'&quot;)">';
      html+=g.cover?'<img src="'+g.cover+'" style="width:24px;height:34px;object-fit:cover;border-radius:3px;flex-shrink:0">':'<div style="width:24px;height:34px;background:var(--bg4);border-radius:3px;flex-shrink:0"></div>';
      html+='<span style="font-size:12px">'+g.name+'</span></div>';
    });
    html+='</div>';
    box.innerHTML=html;
  }catch(e){var box=document.getElementById('slot-sugg-'+idx);if(box)box.innerHTML='';}
}

function selectSlotSugg(idx,name,cover){
  var slot=document.getElementById('slot-'+idx);if(!slot)return;
  var ti=slot.querySelector('.slot-title');if(ti)ti.value=name;
  var ci=slot.querySelector('.slot-cover');if(ci)ci.value=cover;
  var th=document.getElementById('slot-thumb-'+idx);
  if(th)th.outerHTML=cover?'<img src="'+cover+'" style="width:32px;height:44px;object-fit:cover;border-radius:4px;margin-top:4px;display:block" id="slot-thumb-'+idx+'">':'<span id="slot-thumb-'+idx+'"></span>';
  var box=document.getElementById('slot-sugg-'+idx);if(box)box.innerHTML='';
}

function saveSlotData(){
  var slots=document.querySelectorAll('.disc-slot');
  var newData={};
  slots.forEach(function(sl,i){
    var prevType=(S.slotData[i]||{}).itemType||'disc';
    newData[i]={
      title:sl.querySelector('.slot-title')?sl.querySelector('.slot-title').value:'',
      cover:sl.querySelector('.slot-cover')?sl.querySelector('.slot-cover').value:'',
      plat:sl.querySelector('.slot-plat')?sl.querySelector('.slot-plat').value:'PS5',
      cond:sl.querySelector('.slot-cond')?sl.querySelector('.slot-cond').value:'used',
      qty:sl.querySelector('.slot-qty')?(parseInt(sl.querySelector('.slot-qty').value)||1):1,
      itemType:sl.querySelector('.slot-itemtype')?sl.querySelector('.slot-itemtype').value:prevType
    };
  });
  S.slotData=newData;
}

function autoNumberShipName(){
  // Only auto-number for NEW shipments (not editing), and only if name doesn't already have a number
  if(S.editShipId)return;
  var nameInp=document.getElementById('sh-name');if(!nameInp)return;
  var src=document.getElementById('sh-source').value;
  var rawName=nameInp.value.trim();
  // Strip existing " #N" suffix to get base name
  var baseName=rawName.replace(/\s*#\d+\s*$/,'').trim();
  if(!baseName||!src)return;
  // Count existing shipments with same base name AND same source
  var existing=Object.values(S.shipments).filter(function(s){
    if(s.source!==src)return false;
    var sn=(s.name||'').replace(/\s*#\d+\s*$/,'').trim();
    return sn.toLowerCase()===baseName.toLowerCase();
  });
  var nextNum=existing.length+1;
  nameInp.value=baseName+' #'+nextNum;
  nameInp.dataset.autoNumbered='1';
}
function clearSourceSel(){
  ['Georgia','USA','Dubai'].forEach(function(s){
    var b=document.getElementById('src-'+s);if(b)b.classList.remove('sel');
  });
  var inp=document.getElementById('sh-source');if(inp)inp.style.display='';
}
function selSource(src){
  document.getElementById('sh-source').value=src;
  document.getElementById('sh-source').style.display='none';
  ['Georgia','USA','Dubai'].forEach(function(s){
    var b=document.getElementById('src-'+s);if(b)b.classList.toggle('sel',s===src);
  });
  autoNumberShipName();
}

function onShipCount(val){
  var n=Math.max(1,Math.min(50,parseInt(val)||1));
  saveSlotData();S.shipSlots=n;
  var container=document.getElementById('ship-slots');if(!container)return;
  var html='';for(var i=0;i<n;i++)html+=buildSlotHtml(i);
  container.innerHTML=html;
}

function saveShipment(){
  saveSlotData();
  var name=document.getElementById('sh-name').value.trim();
  var source=document.getElementById('sh-source').value.trim();
  var date=new Date(document.getElementById('sh-date').value).getTime();
  var discCount=parseInt(document.getElementById('sh-count').value)||1;
  var purchaseCost=parseFloat(document.getElementById('sh-purchase').value)||0;
  var deliveryCostVal=parseFloat(document.getElementById('sh-delivery').value)||0;
  var notes=document.getElementById('sh-notes').value.trim();
  var totalCost=purchaseCost+deliveryCostVal;
  var perDisc=discCount>0?totalCost/discCount:0;
  var id=uid();
  db.ref('shipments/'+id).set({id:id,name:name,source:source,date:date,discCount:discCount,purchaseCost:purchaseCost,deliveryCostVal:deliveryCostVal,totalCost:totalCost,perDisc:perDisc,notes:notes,shipStatus:'transit',inExpenses:totalCost>0});
  if(totalCost>0){
    var eid=uid();
    db.ref('expenses/'+eid).set({id:eid,name:name||(lang==='ka'?'\u10de\u10d0\u10e0\u10e2\u10d8\u10d0':'\u041f\u0430\u0440\u0442\u0438\u044f'),to:source,amount:totalCost,date:date,type:'shipping'});
  }
  // Use actual count of slot data entries (not S.shipSlots which can desync from the count input)
  var maxIdx=Math.max(S.shipSlots,Object.keys(S.slotData).length,discCount);
  var added=0;
  for(var i=0;i<maxIdx;i++){
    var d=S.slotData[i];if(!d||!d.title)continue;
    var gid=uid();
    db.ref('games/'+gid).set({id:gid,title:d.title,platform:d.plat||'PS5',condition:d.cond||'used',cover:d.cover||'',qty:parseInt(d.qty)||1,status:'transit',shipmentId:id,addedAt:Date.now()+i,soldAt:null,exchangedAt:null,itemType:d.itemType||'disc'});
    added++;
  }
  S.slotData={};S.shipSlots=1;
  showToast(t('ship_exp_added')+' ('+added+')');closeModalForce();
}

function saveShipEdit(){
  saveSlotData();
  var id=S.editShipId;if(!id)return;
  var name=document.getElementById('sh-name').value.trim();
  var source=document.getElementById('sh-source').value.trim();
  var date=new Date(document.getElementById('sh-date').value).getTime();
  var discCount=parseInt(document.getElementById('sh-count').value)||1;
  var purchaseCost=parseFloat(document.getElementById('sh-purchase').value)||0;
  var deliveryCostVal=parseFloat(document.getElementById('sh-delivery').value)||0;
  var notes=document.getElementById('sh-notes').value.trim();
  var totalCost=purchaseCost+deliveryCostVal;
  var perDisc=discCount>0?totalCost/discCount:0;
  db.ref('shipments/'+id).update({name:name,source:source,date:date,discCount:discCount,purchaseCost:purchaseCost,deliveryCostVal:deliveryCostVal,totalCost:totalCost,perDisc:perDisc,notes:notes});

  // Sync items: existing linked games get updated, new slots create new games
  var existingLinked=Object.entries(S.games)
    .filter(function(e){return e[1].shipmentId===id;})
    .sort(function(a,b){return (a[1].addedAt||0)-(b[1].addedAt||0);});

  var maxIdx=Math.max(S.shipSlots,Object.keys(S.slotData).length,discCount,existingLinked.length);
  var added=0,updated=0;
  for(var i=0;i<maxIdx;i++){
    var d=S.slotData[i];
    var existingEntry=existingLinked[i];
    if(!d||!d.title){
      continue; // empty slot - leave any existing linked game untouched
    }
    if(existingEntry){
      // Update existing game
      var gid=existingEntry[0];
      db.ref('games/'+gid).update({title:d.title,platform:d.plat||'PS5',condition:d.cond||'used',cover:d.cover||'',qty:parseInt(d.qty)||1,itemType:d.itemType||'disc'});
      updated++;
    } else {
      // Create new game (e.g. accessory added during edit)
      var newGid=uid();
      db.ref('games/'+newGid).set({id:newGid,title:d.title,platform:d.plat||'PS5',condition:d.cond||'used',cover:d.cover||'',qty:parseInt(d.qty)||1,status:'transit',shipmentId:id,addedAt:Date.now()+i,soldAt:null,exchangedAt:null,itemType:d.itemType||'disc'});
      added++;
    }
  }
  showToast(t('saved')+(added>0?' (+'+added+')':''));closeModalForce();
}

function deleteShipment(id){if(!confirm(t('del_ship')))return;db.ref('shipments/'+id).remove();}

  EX={selectedGave:[],receivedSlots:1,receivedData:{},editId:null};

}

function openEditExchange(id){
  var ex=S.exchanges[id];if(!ex)return;
  EX={selectedGave:ex.gave?ex.gave.slice():[],receivedSlots:Math.max((ex.got||[]).length,1),receivedData:{},editId:id};

var recvTimers={};
function onRecvInput(idx,val){
  saveRecvData();
  clearTimeout(recvTimers[idx]);
  var box=document.getElementById('recv-sugg-'+idx);
  if(!val||val.length<2){if(box)box.innerHTML='';return;}
  recvTimers[idx]=setTimeout(function(){fetchRecvSugg(idx,val);},600);
}

async function fetchRecvSugg(idx,q){
  try{
    var results=await searchIGDB(q,5);
    var box=document.getElementById('recv-sugg-'+idx);if(!box)return;
    if(!results.length){box.innerHTML='';return;}
    var html='<div class="slot-sugg-box">';
    results.forEach(function(g){
      var sn=g.name.replace(/&/g,'&amp;').replace(/"/g,'&quot;');
      var sc=(g.cover||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;');
      html+='<div class="slot-sugg-item" onclick="selectRecvSugg('+idx+',&quot;'+sn+'&quot;,&quot;'+sc+'&quot;)">';
      html+=g.cover?'<img src="'+g.cover+'" style="width:24px;height:34px;object-fit:cover;border-radius:3px;flex-shrink:0">':'<div style="width:24px;height:34px;background:var(--bg4);border-radius:3px;flex-shrink:0"></div>';
      html+='<span style="font-size:12px">'+g.name+'</span></div>';
    });
    html+='</div>';
    box.innerHTML=html;
  }catch(e){var box=document.getElementById('recv-sugg-'+idx);if(box)box.innerHTML='';}
}

function selectRecvSugg(idx,name,cover){
  var slot=document.getElementById('recv-slot-'+idx);if(!slot)return;
  var ti=slot.querySelector('.recv-title');if(ti)ti.value=name;
  var ci=slot.querySelector('.recv-cover');if(ci)ci.value=cover;
  var th=document.getElementById('recv-thumb-'+idx);
  if(th)th.outerHTML=cover?'<img src="'+cover+'" style="width:32px;height:44px;object-fit:cover;border-radius:4px;margin-top:4px;display:block" id="recv-thumb-'+idx+'">':'<span id="recv-thumb-'+idx+'"></span>';
  if(!EX.receivedData[idx])EX.receivedData[idx]={};
  EX.receivedData[idx].title=name;EX.receivedData[idx].cover=cover;
  var box=document.getElementById('recv-sugg-'+idx);if(box)box.innerHTML='';
}

function saveRecvData(){
  for(var i=0;i<EX.receivedSlots;i++){
    var slot=document.getElementById('recv-slot-'+i);if(!slot)continue;
    if(!EX.receivedData[i])EX.receivedData[i]={};
    var ti=slot.querySelector('.recv-title');if(ti)EX.receivedData[i].title=ti.value;
    var ci=slot.querySelector('.recv-cover');if(ci)EX.receivedData[i].cover=ci.value;
    var pi=slot.querySelector('.recv-plat');if(pi)EX.receivedData[i].plat=pi.value;
    var coi=slot.querySelector('.recv-cond');if(coi)EX.receivedData[i].cond=coi.value;
  }
}

function addReceivedSlot(){
  saveRecvData();
  EX.receivedSlots++;
  renderExchangeModal();
}

function toggleGave(gid){

function saveExchange(){

  var surchargeThem=parseFloat((document.getElementById('ex-surcharge-them')||{}).value)||0;
