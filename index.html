function exchangeToStock(exchangeId){
  var ex=S.exchanges[exchangeId];if(!ex)return;
  (ex.got||[]).forEach(function(d){
    if(d.gameId)db.ref('games/'+d.gameId).update({status:'available'});
  });
  showToast(t('exchange_moved'));
}

function legacyToStock(gameId){
  db.ref('games/'+gameId).update({status:'available',exchangedAt:null});
  showToast(t('exchange_moved'));
}

function deleteExchange(id){
  if(!confirm(t('del_exchange')))return;
  var ex=S.exchanges[id];
  if(ex&&ex.gave){
    ex.gave.forEach(function(gid){
      var g=S.games[gid];
      if(g&&g.status==='exchange'&&g.exchangeId===id){
        db.ref('games/'+gid).update({status:'available',exchangedAt:null,exchangeId:null});
      }
    });
  }
  if(ex&&ex.got){
    ex.got.forEach(function(d){
      if(d.gameId)db.ref('games/'+d.gameId).remove();
    });
  }
  Object.entries(S.expenses).forEach(function(e){
    var exp=e[1];
    if(exp.exchangeId===id){db.ref('expenses/'+e[0]).remove();}
  });
  db.ref('exchanges/'+id).remove();
  showToast(t('deleted'));
}

var statChart=null;
function setStatPeriod(p){S.statPeriod=p;renderStatsPage();}
function renderStatsPage(){
  var page=document.getElementById('page-stats');if(!page||S.page!=='stats')return;
  var now=new Date(),games=Object.values(S.games),expenses=Object.values(S.expenses);
  function inP(ts){
    if(!ts)return false;var d=new Date(ts);
    if(S.statPeriod==='week'){var w=new Date(now);w.setDate(now.getDate()-7);return d>=w;}
    if(S.statPeriod==='year')return d.getFullYear()===now.getFullYear();
    return d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth();
  }
  var sold=games.filter(function(g){return g.status==='sold'&&inP(g.soldAt||g.addedAt);});
  var revenue=sold.reduce(function(s,g){return s+parseFloat(g.price||0);},0);
  var pExp=expenses.filter(function(e){return inP(e.date);});
  var extraIncomeTypes=['exchange_income','extra_income'];
  var extraIncome=pExp.filter(function(e){return extraIncomeTypes.includes(e.type);}).reduce(function(s,e){return s+Math.abs(parseFloat(e.amount||0));},0);
  revenue+=extraIncome;
  var extraExp=pExp.filter(function(e){return !extraIncomeTypes.includes(e.type);}).reduce(function(s,e){return s+parseFloat(e.amount||0);},0);
  var profit=revenue-extraExp;
  var dd=[{label:t('revenue'),value:revenue,color:'#3ecf8e'},{label:t('extra_exp'),value:extraExp,color:'#f0a832'}];

  var pBtns=['week','month','year'].map(function(p){return '<button class="period-btn'+(S.statPeriod===p?' active':'')+'" onclick="setStatPeriod(\''+p+'\')">'+t('p'+p[0])+'</button>';}).join('');

  var legendHtml=dd.map(function(d){return '<div class="legend-item"><div style="display:flex;align-items:center"><div class="legend-dot" style="background:'+d.color+'"></div><div class="legend-label">'+d.label+'</div></div><div class="legend-val" style="color:'+d.color+'">'+d.value.toFixed(0)+' \u20be</div></div>';}).join('')
    +'<div class="legend-item" style="border-top:1px solid var(--border);padding-top:7px;margin-top:4px"><div style="display:flex;align-items:center"><div class="legend-dot" style="background:var(--accent)"></div><div class="legend-label">'+t('profit')+'</div></div><div class="legend-val" style="color:'+(profit>=0?'var(--green)':'var(--red)')+'">'+(profit>=0?'+':'')+profit.toFixed(0)+' \u20be</div></div>';

  var expHtml=pExp.length?pExp.sort(function(a,b){return (b.date||0)-(a.date||0);}).map(function(e){
    var isIncome=e.type==='exchange_income'||e.type==='expense_reduction'||e.type==='extra_income';
    var amt=parseFloat(e.amount||0);
    return '<div class="exp-item"><div><div style="font-size:13px;font-weight:600">'+(e.name||'\u2014')+'</div><div style="font-size:11px;color:var(--text2)">'+(e.to?e.to+' \xb7 ':'')+fmtDate(e.date)+'</div></div>'
      +'<div style="display:flex;align-items:center;gap:8px"><span class="exp-amount" style="color:'+(isIncome?'var(--green)':'var(--red)')+'">'+(isIncome?'+':'-')+Math.abs(amt).toFixed(0)+' \u20be</span>'
      +(e.type!=='exchange_income'&&e.type!=='exchange_expense'?'<button onclick="deleteExpense(\''+e.id+'\')" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:2px">\xd7</button>':'')+'</div></div>';
  }).join(''):'<div style="color:var(--text3);font-size:13px;text-align:center;padding:20px 0">'+t('no_exp')+'</div>';

  page.innerHTML='<div class="period-row">'+pBtns+'</div>'
    +'<div class="fin-cards"><div class="fin-card"><div class="fin-card-lbl">'+t('revenue')+'</div><div class="fin-card-val" style="color:var(--green)">'+revenue.toFixed(0)+' \u20be</div><div class="fin-card-sub">'+sold.length+' '+t('sales_n')+'</div></div>'
    +'<div class="fin-card"><div class="fin-card-lbl">'+t('profit')+'</div><div class="fin-card-val" style="color:'+(profit>=0?'var(--green)':'var(--red)')+'">'+(profit>=0?'+':'')+profit.toFixed(0)+' \u20be</div><div class="fin-card-sub">'+t('net')+'</div></div>'
    +'<div class="fin-card"><div class="fin-card-lbl">'+t('extra_exp')+'</div><div class="fin-card-val" style="color:var(--amber)">'+extraExp.toFixed(0)+' \u20be</div><div class="fin-card-sub">'+t('period')+'</div></div></div>'
    +'<div class="stats-layout">'
    +'<div class="chart-wrap"><div class="chart-title">'+t('structure')+'</div><canvas id="donut-canvas" width="155" height="155"></canvas><div class="legend">'+legendHtml+'</div></div>'
    +'<div class="stats-right"><div class="expenses-section"><div class="exp-title">'+t('exp_title')+'</div>'+expHtml+'<button class="btn-exp-add" onclick="openAddExpense()">'+t('add_exp')+'</button></div></div>'
    +'</div>';

  drawDonut(dd,revenue);
}

function drawDonut(dd,total){
  var canvas=document.getElementById('donut-canvas');if(!canvas)return;
  var ctx=canvas.getContext('2d');
  var cx=77.5,cy=77.5,r=62,lw=18;
  ctx.clearRect(0,0,155,155);
  var sum=dd.reduce(function(s,d){return s+Math.max(d.value,0);},0);
  if(sum<=0){
    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=lw;ctx.stroke();
    return;
  }
  var start=-Math.PI/2;
  dd.forEach(function(d){
    if(d.value<=0)return;
    var slice=(d.value/sum)*Math.PI*2;
    ctx.beginPath();ctx.arc(cx,cy,r,start,start+slice);ctx.strokeStyle=d.color;ctx.lineWidth=lw;ctx.lineCap='butt';ctx.stroke();
    start+=slice;
  });
  ctx.fillStyle='#f0f0f5';ctx.font='bold 15px -apple-system,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(total.toFixed(0)+' \u20be',cx,cy-6);
  ctx.fillStyle='#9090a8';ctx.font='10px -apple-system,sans-serif';
  ctx.fillText(t('revenue'),cx,cy+12);
}

async function loadRates(){
  try{
    var r=await fetch('https://nbg.gov.ge/gw/api/ct/monetarypolicy/currencies/en/json');
    var data=await r.json();
    var rates={};
    if(data&&data[0]&&data[0].currencies){
      data[0].currencies.forEach(function(c){rates[c.code]=c.rate;});
    }
    S.rates=rates;
    var card=document.getElementById('rates-card');if(!card)return;
    var rows=[
      {code:'USD',flag:'\ud83c\uddfa\ud83c\uddf8',name:'US Dollar'},
      {code:'EUR',flag:'\ud83c\uddea\ud83c\uddfa',name:'Euro'},
      {code:'GBP',flag:'\ud83c\uddec\ud83c\udde7',name:'British Pound'},
      {code:'RUB',flag:'\ud83c\uddf7\ud83c\uddfa',name:'Russian Ruble'},
      {code:'TRY',flag:'\ud83c\uddf9\ud83c\uddf7',name:'Turkish Lira'}
    ];
    card.innerHTML='<div class="rates-header"><div class="rates-title">'+t('rates_title')+'</div><div class="rates-time">'+new Date().toLocaleDateString('ru-RU')+'</div></div>'
      +rows.map(function(c){
        var flag=c.flag2||c.flag;
        var rate=rates[c.code]?rates[c.code].toFixed(4):'\u2014';
        return '<div class="rate-row"><div class="rate-left"><span class="rate-flag">'+flag+'</span><div><div class="rate-name">'+c.name+'</div><div class="rate-code">'+c.code+'/GEL</div></div></div><div class="rate-val">'+rate+'</div></div>';
      }).join('');
    calcConvert();
  }catch(e){
    var card=document.getElementById('rates-card');
    if(card)card.innerHTML='<div class="rates-loading">'+t('no_conn')+'</div>';
  }
}

function calcConvert(){
  var amount=parseFloat(document.getElementById('calc-amount').value)||0;
  var cur=document.getElementById('calc-cur').value;
  var rate=S.rates[cur]||0;
  var result=amount*rate;
  var el=document.getElementById('calc-result');
  if(el)el.textContent=rate?result.toFixed(2)+' \u20be':'\u2014';
}
function setCalcAmount(v){
  var inp=document.getElementById('calc-amount');if(inp)inp.value=v;
  calcConvert();
}

function exportExcel(){

  var now=new Date();

  // Sheet definitions
  var sheets=[
    {name:lang==='ka'?'\u10db\u10d0\u10e0\u10d0\u10d2\u10e8\u10d8':'\u041d\u0430\u043b\u0438\u0447\u0438\u0435',   status:['available']},

    {name:lang==='ka'?'\u10d2\u10d0\u10ea\u10d5\u10da\u10d0':'\u041e\u10d1\u043c\u10d5\u043d',       status:['exchange']},
  ];

  var cols=lang==='ka'
    ?['\u10e1\u10d0\u10ee\u10d4\u10da\u10d8','\u10de\u10da\u10d0\u10e2\u10e4\u10dd\u10e0\u10db\u10d0','\u10e0\u10d0\u10dd\u10d3\u10d4\u10dc\u10dd\u10d1\u10d0','\u10db\u10d3\u10d2\u10dd\u10db\u10d0\u10e0\u10d4\u10dd\u10d1\u10d0','\u10d7\u10d5\u10d8\u10d7\u10e6\u10d8\u10e0\u10d4\u10d1\u10e3\u10da\u10d4\u10d1\u10d0 (\u20be)','\u10e8\u10d4\u10e1\u10ee\u10d4\u10d1\u10d0 (\u20be)','\u10e1\u10e3\u10da \u10e6\u10d8\u10e0\u10d4\u10d1\u10e3\u10da\u10d4\u10d1\u10d0 (\u20be)','\u10d9\u10da\u10d8\u10d4\u10dc\u10e2\u10d8','\u10e2\u10d4\u10da\u10d4\u10e4\u10dd\u10dc\u10d8','\u10e8\u10d4\u10dc\u10d8\u10e8\u10d5\u10dc\u10d4\u10d1\u10d4\u10d1\u10d8','\u10d3\u10d0\u10db\u10d0\u10e2\u10d4\u10d1\u10d8\u10e1 \u10d7\u10d0\u10e0\u10d8\u10e6\u10d8']
    :['\u041d\u0430\u0437\u0432\u0430\u043d\u0438\u0435','\u041f\u043b\u0430\u0442\u0444\u043e\u0440\u043c\u0430','\u0420\u0435\u0433\u0438\u043e\u043d','\u0421\u043e\u0441\u0442\u043e\u044f\u043d\u0438\u0435','\u0421\u0435\u0431\u0435\u0441\u0442\u043e\u0438\u043c\u043e\u0441\u0442\u044c (\u20be)','\u0426\u0435\u043d\u0430 \u043f\u0440\u043e\u0434\u0430\u0436\u0438 (\u20be)','\u0418\u0442\u043e\u0433\u043e (\u20be)','\u041a\u043e\u043b-\u0432\u043e','\u041a\u043b\u0438\u0435\u043d\u0442','\u0422\u0435\u043b\u0435\u0444\u043e\u043d','\u0417\u0430\u043c\u0435\u0442\u043a\u0438','\u0414\u0430\u0442\u0430 \u0434\u043e\u0431\u0430\u0432\u043b\u0435\u043d\u0438\u044f'];

  function esc(v){return String(v||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  function cell(v,isNum){
    var s=String(v||'');
    if(isNum&&s&&!isNaN(s))return '<c t="n"><v>'+s+'</v></c>';
    return '<c t="inlineStr"><is><t>'+esc(s)+'</t></is></c>';
  }

  function getCostGel(g){
    var rates={'\u20be':1,'$':2.7,'\u20ac':2.95};
    if(g.cost)return parseFloat(g.cost||0)*(rates[g.costCurrency]||1);
    // Fallback to shipment per-disc cost if no manual cost set
    if(g.shipmentId&&S.shipments[g.shipmentId])return parseFloat(S.shipments[g.shipmentId].perDisc||0);
    return 0;
  }

  function makeSheet(rows){
    // Group by title+platform+condition (so PS4/PS5 and new/used stay separate)
    var groups={};
    var order=[];
    rows.forEach(function(g){
      var key=(g.title||'').toLowerCase().trim()+'|'+(g.platform||'')+'|'+(g.condition||'');
      if(!groups[key]){
        groups[key]={
          title:g.title,
          platform:g.platform,
          region:g.region,
          condition:g.condition,
          qty:0,
          costSum:0,
          costCount:0,
          priceSum:0,
          priceCount:0,
          persons:[],
          phones:[],
          notesArr:[],
          latestAt:0
        };
        order.push(key);
      }
      var grp=groups[key];
      grp.qty+=parseInt(g.qty)||1;
      var costGel=getCostGel(g);
      if(costGel>0){grp.costSum+=costGel;grp.costCount++;}
      var price=parseFloat(g.price||0);
      if(price>0){grp.priceSum+=price;grp.priceCount++;}
      if(g.person&&grp.persons.indexOf(g.person)===-1)grp.persons.push(g.person);
      if(g.phone&&grp.phones.indexOf(g.phone)===-1)grp.phones.push(g.phone);
      if(g.notes&&grp.notesArr.indexOf(g.notes)===-1)grp.notesArr.push(g.notes);
      if((g.addedAt||0)>grp.latestAt)grp.latestAt=g.addedAt||0;
    });

    var xml='<?xml version="1.0" encoding="UTF-8"?><worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main"><cols>'
      +'<col min="1" max="1" width="42" customWidth="1"/>'
      +'<col min="2" max="2" width="12" customWidth="1"/>'
      +'<col min="3" max="3" width="10" customWidth="1"/>'
      +'<col min="4" max="4" width="9" customWidth="1"/>'
      +'<col min="5" max="5" width="16" customWidth="1"/>'
      +'<col min="6" max="6" width="16" customWidth="1"/>'
      +'<col min="7" max="7" width="14" customWidth="1"/>'
      +'<col min="8" max="8" width="16" customWidth="1"/>'
      +'<col min="9" max="9" width="14" customWidth="1"/>'
      +'<col min="10" max="10" width="24" customWidth="1"/>'
      +'<col min="11" max="11" width="14" customWidth="1"/>'
      +'</cols><sheetData>';
    xml+='<row>';
    cols.forEach(function(c){xml+=cell(c);});
    xml+='</row>';

    // Sort: platform group first (PS5, then PS4, then others), then by latest date within each
    function platRank(p){
      if(!p)return 9;
      if(p.indexOf('PS5')!==-1&&p.indexOf('PS4')!==-1)return 2; // PS4/PS5 combined
      if(p.indexOf('PS5')!==-1)return 0;
      if(p.indexOf('PS4')!==-1)return 1;
      return 9;
    }
    order.sort(function(a,b){
      var pa=platRank(groups[a].platform),pb=platRank(groups[b].platform);
      if(pa!==pb)return pa-pb;
      return groups[b].latestAt-groups[a].latestAt;
    });

    var lastPlat=null;
    order.forEach(function(key){
      var grp=groups[key];
      // Insert platform section header row when platform changes
      if(grp.platform!==lastPlat){
        lastPlat=grp.platform;
        xml+='<row><c t="inlineStr"><is><t>'+esc('\u2500\u2500\u2500 '+(grp.platform||'\u2014')+' \u2500\u2500\u2500')+'</t></is></c></row>';
      }
      var added=grp.latestAt?new Date(grp.latestAt).toLocaleDateString('ru-RU'):'';
      var condLabel=grp.condition==='new'?t('cond_new'):t('cond_used');
      var avgCost=grp.costCount?(grp.costSum/grp.costCount):0;
      var avgPrice=grp.priceCount?(grp.priceSum/grp.priceCount):0;
      var totalCost=grp.costSum;
      xml+='<row>';
      xml+=cell(grp.title);
      xml+=cell(grp.platform);
      xml+=cell(grp.region);
      xml+=cell(condLabel);
      xml+=cell(avgCost?avgCost.toFixed(2):'',avgCost>0);
      xml+=cell(avgPrice?avgPrice.toFixed(2):'',avgPrice>0);
      xml+=cell(totalCost?totalCost.toFixed(2):'',totalCost>0);
      xml+=cell(grp.qty,true);
      xml+=cell(grp.persons.join(', '));
      xml+=cell(grp.phones.join(', '));
      xml+=cell(grp.notesArr.join('; '));
      xml+=cell(added);
      xml+='</row>';
    });
    xml+='</sheetData></worksheet>';
    return xml;
  }

  // Build workbook
  var sheetXmls=sheets.map(function(sh){
    var rows=games.filter(function(g){return sh.status.includes(g.status);});
    return makeSheet(rows);
  });

  // Relationships
  var relsXml='<?xml version="1.0" encoding="UTF-8"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">';
  sheets.forEach(function(sh,i){relsXml+='<Relationship Id="rId'+(i+1)+'" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet'+(i+1)+'.xml"/>';});
  relsXml+='</Relationships>';

  var workbookXml='<?xml version="1.0" encoding="UTF-8"?><workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheets>';
  sheets.forEach(function(sh,i){workbookXml+='<sheet name="'+esc(sh.name)+'" sheetId="'+(i+1)+'" r:id="rId'+(i+1)+'"/>';});
  workbookXml+='</sheets></workbook>';

  var contentTypes='<?xml version="1.0" encoding="UTF-8"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/>';
  sheets.forEach(function(sh,i){contentTypes+='<Override PartName="/xl/worksheets/sheet'+(i+1)+'.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>';});
  contentTypes+='</Types>';

  var pkgRels='<?xml version="1.0" encoding="UTF-8"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/></Relationships>';

  function strToU8(str){
    var buf=new TextEncoder().encode(str);return buf;
  }
  function crc32(buf){
    var crc=0xFFFFFFFF;
    var table=[];
    for(var i=0;i<256;i++){var c=i;for(var j=0;j<8;j++)c=c&1?(0xEDB88320^(c>>>1)):c>>>1;table[i]=c;}
    for(var k=0;k<buf.length;k++)crc=table[(crc^buf[k])&0xFF]^(crc>>>8);
    return (crc^0xFFFFFFFF)>>>0;
  }
  function u32le(n){return [n&0xFF,(n>>8)&0xFF,(n>>16)&0xFF,(n>>24)&0xFF];}
  function u16le(n){return [n&0xFF,(n>>8)&0xFF];}

  function makeZip(files){
    var parts=[];
    var centralDir=[];
    var offset=0;

    files.forEach(function(f){
      var name=new TextEncoder().encode(f.name);
      var data=f.data;
      var crc=crc32(data);
      var local=[
        0x50,0x4B,0x03,0x04,
        0x14,0x00,
        0x00,0x00,
        0x00,0x00,
        0x00,0x00,0x00,0x00,
      ].concat(u32le(crc))
       .concat(u32le(data.length))
       .concat(u32le(data.length))
       .concat(u16le(name.length))
       .concat([0x00,0x00]);
      var localArr=new Uint8Array(local.length+name.length+data.length);
      localArr.set(local);localArr.set(name,local.length);localArr.set(data,local.length+name.length);

      centralDir.push({name:name,crc:crc,size:data.length,offset:offset});
      parts.push(localArr);
      offset+=localArr.length;
    });

    var cdStart=offset;
    var cdParts=[];
    centralDir.forEach(function(cd){
      var entry=[
        0x50,0x4B,0x01,0x02,
        0x14,0x00,0x14,0x00,
        0x00,0x00,0x00,0x00,
        0x00,0x00,0x00,0x00,
      ].concat(u32le(cd.crc))
       .concat(u32le(cd.size))
       .concat(u32le(cd.size))
       .concat(u16le(cd.name.length))
       .concat([0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00])
       .concat(u32le(cd.offset));
      var arr=new Uint8Array(entry.length+cd.name.length);
      arr.set(entry);arr.set(cd.name,entry.length);
      cdParts.push(arr);
    });

    var cdSize=cdParts.reduce(function(s,a){return s+a.length;},0);
    var eocd=[
      0x50,0x4B,0x05,0x06,
      0x00,0x00,0x00,0x00,
    ].concat(u16le(files.length))
     .concat(u16le(files.length))
     .concat(u32le(cdSize))
     .concat(u32le(cdStart))
     .concat([0x00,0x00]);

    var total=parts.reduce(function(s,a){return s+a.length;},0)+cdSize+eocd.length;
    var result=new Uint8Array(total);
    var pos=0;
    parts.forEach(function(a){result.set(a,pos);pos+=a.length;});
    cdParts.forEach(function(a){result.set(a,pos);pos+=a.length;});
    result.set(eocd,pos);
    return result;
  }

  var files=[
    {name:'[Content_Types].xml', data:strToU8(contentTypes)},
    {name:'_rels/.rels', data:strToU8(pkgRels)},
    {name:'xl/workbook.xml', data:strToU8(workbookXml)},
    {name:'xl/_rels/workbook.xml.rels', data:strToU8(relsXml)},
  ];
  sheetXmls.forEach(function(xml,i){
    files.push({name:'xl/worksheets/sheet'+(i+1)+'.xml', data:strToU8(xml)});
  });

  var zip=makeZip(files);
  var blob=new Blob([zip],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;
  a.download='ND-Games-'+dateStr+'.xlsx';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(function(){URL.revokeObjectURL(url);},1000);
  showToast('\u2193 Excel \u0441\u043a\u0430\u0447\u0438\u0432\u0430\u0435\u0442\u0441\u044f');
}

  var now=new Date();
  var dateStr=now.toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric'});

  var cols1=lang==='ka'
    ?['\u10de\u10d0\u10e0\u10e2\u10d8\u10d0','\u10e1\u10e2\u10d0\u10e2\u10e3\u10e1\u10d8','\u10d7\u10d0\u10e0\u10d8\u10e6\u10d8','\u10d3\u10d8\u10e1\u10d9\u10d4\u10d1\u10d8','\u10e8\u10d4\u10e1\u10ee\u10d4\u10d1\u10d0 (\u20be)','\u10db\u10d8\u10e2\u10d0\u10dc\u10d0 (\u20be)','\u10e1\u10e3\u10da \u10e6\u10d8\u10e0\u10d4\u10d1\u10e3\u10da\u10d4\u10d1\u10d0 (\u20be)','\u20be/\u10d3\u10d8\u10e1\u10d9\u10d8','\u10e8\u10d4\u10dc\u10d8\u10e8\u10d5\u10dc\u10d4\u10d1\u10d8']
    :['\u041f\u0430\u0440\u0442\u0438\u044f','\u0421\u0442\u0430\u0442\u0443\u0441','\u0414\u0430\u0442\u0430','\u0414\u0438\u0441\u043a\u043e\u0432','\u0417\u0430\u043a\u0443\u043f\u043a\u0430 (\u20be)','\u0414\u043e\u0441\u0442\u0430\u0432\u043a\u0430 (\u20be)','\u0418\u0442\u043e\u0433\u043e (\u20be)','\u20be/\u0434\u0438\u0441\u043a','\u0417\u0430\u043c\u0435\u0442\u043a\u0438'];

  // SHEET 2: Items inside shipments
  var cols2=lang==='ka'
    ?['\u10de\u10d0\u10e0\u10e2\u10d8\u10d0','\u10e1\u10d0\u10ee\u10d4\u10da\u10d8','\u10e2\u10d8\u10de\u10d8','\u10de\u10da\u10d0\u10e2\u10e4\u10dd\u10e0\u10db\u10d0','\u10db\u10d3\u10d2\u10dd\u10db\u10d0\u10e0\u10d4\u10dd\u10d1\u10d0','\u10e0\u10d0\u10dd\u10d3\u10d4\u10dc\u10dd\u10d1\u10d0','\u10e1\u10e2\u10d0\u10e2\u10e3\u10e1\u10d8']
    :['\u041f\u0430\u0440\u0442\u0438\u044f','\u041d\u0430\u0437\u0432\u0430\u043d\u0438\u0435','\u0422\u0438\u043f','\u041f\u043b\u0430\u0442\u0444\u043e\u0440\u043c\u0430','\u0421\u043e\u0441\u0442\u043e\u044f\u043d\u0438\u0435','\u041a\u043e\u043b-\u0432\u043e','\u0421\u0442\u0430\u0442\u0443\u0441'];

  function esc(v){return String(v||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  function cell(v,isNum){
    var s=String(v||'');
    if(isNum&&s&&!isNaN(s))return '<c t="n"><v>'+s+'</v></c>';
    return '<c t="inlineStr"><is><t>'+esc(s)+'</t></is></c>';
  }
  function typeLabel(tp){
    if(tp==='steelbook')return lang==='ka'?'\u10e1\u10e2\u10d8\u10da\u10d1\u10e3\u10d9\u10d8':'\u0421\u0442\u0438\u043b\u0431\u0443\u043a';
    if(tp==='accessory')return lang==='ka'?'\u10d0\u10d9\u10e1\u10d4\u10e1\u10e3\u10d0\u10e0\u10d8':'\u0410\u043a\u0441\u0435\u0441\u0441\u0443\u0430\u0440';
    return lang==='ka'?'\u10d3\u10d8\u10e1\u10d9\u10d8':'\u0414\u0438\u0441\u043a';
  }
  function condLabel(c){return c==='new'?t('cond_new'):t('cond_used');}

  var sortedShips=ships.slice().sort(function(a,b){return (b.date||0)-(a.date||0);});

  // Build sheet 1 XML
  var xml1='<?xml version="1.0" encoding="UTF-8"?><worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main"><sheetData>';
  xml1+='<row>';cols1.forEach(function(c){xml1+=cell(c);});xml1+='</row>';
  sortedShips.forEach(function(s){
    var purchase=parseFloat(s.purchaseCost||0),delivery=parseFloat(s.deliveryCostVal||0),total=purchase+delivery;
    var count=parseInt(s.discCount)||1,perDisc=count>0?total/count:0;
    var statusLabel=s.shipStatus==='received'?t('ship_received'):t('ship_transit');
    var dateLabel=s.date?new Date(s.date).toLocaleDateString('ru-RU'):'';
    xml1+='<row>';
    xml1+=cell(s.name);
    xml1+=cell(statusLabel);
    xml1+=cell(dateLabel);
    xml1+=cell(count,true);
    xml1+=cell(purchase,true);
    xml1+=cell(delivery,true);
    xml1+=cell(total,true);
    xml1+=cell(perDisc.toFixed(2),true);
    xml1+=cell(s.notes);
    xml1+='</row>';
  });
  xml1+='</sheetData></worksheet>';

  // Build sheet 2 XML - items inside each shipment
  var xml2='<?xml version="1.0" encoding="UTF-8"?><worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main"><sheetData>';
  xml2+='<row>';cols2.forEach(function(c){xml2+=cell(c);});xml2+='</row>';
  sortedShips.forEach(function(s){
    var items=allGames.filter(function(g){return g.shipmentId===s.id;}).sort(function(a,b){return (a.addedAt||0)-(b.addedAt||0);});
    items.forEach(function(g){
      xml2+='<row>';
      xml2+=cell(s.name);
      xml2+=cell(g.title);
      xml2+=cell(typeLabel(g.itemType||'disc'));
      xml2+=cell(g.platform);
      xml2+=cell(condLabel(g.condition));
      xml2+=cell(parseInt(g.qty)||1,true);
      xml2+=cell(t('st_'+g.status));
      xml2+='</row>';
    });
  });
  xml2+='</sheetData></worksheet>';

  var sheet1Name=lang==='ka'?'\u10de\u10d0\u10e0\u10e2\u10d8\u10d4\u10d1\u10d8':'\u041f\u0430\u0440\u0442\u0438\u0438';
  var sheet2Name=lang==='ka'?'\u10e8\u10d4\u10d8\u10ec\u10e7\u10dd\u10d1\u10d0':'\u0421\u043e\u0441\u0442\u0430\u0432';

  var relsXml='<?xml version="1.0" encoding="UTF-8"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet1.xml"/><Relationship Id="rId2" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet2.xml"/></Relationships>';
  var workbookXml='<?xml version="1.0" encoding="UTF-8"?><workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheets><sheet name="'+esc(sheet1Name)+'" sheetId="1" r:id="rId1"/><sheet name="'+esc(sheet2Name)+'" sheetId="2" r:id="rId2"/></sheets></workbook>';
  var contentTypes='<?xml version="1.0" encoding="UTF-8"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/><Override PartName="/xl/worksheets/sheet1.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/><Override PartName="/xl/worksheets/sheet2.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/></Types>';
  var pkgRels='<?xml version="1.0" encoding="UTF-8"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/></Relationships>';

  function strToU8(str){return new TextEncoder().encode(str);}
  function crc32(buf){
    var crc=0xFFFFFFFF,table=[];
    for(var i=0;i<256;i++){var c=i;for(var j=0;j<8;j++)c=c&1?(0xEDB88320^(c>>>1)):c>>>1;table[i]=c;}
    for(var k=0;k<buf.length;k++)crc=table[(crc^buf[k])&0xFF]^(crc>>>8);
    return (crc^0xFFFFFFFF)>>>0;
  }
  function u32le(n){return [n&0xFF,(n>>8)&0xFF,(n>>16)&0xFF,(n>>24)&0xFF];}
  function u16le(n){return [n&0xFF,(n>>8)&0xFF];}
  function makeZip(files){
    var parts=[],centralDir=[],offset=0;
    files.forEach(function(f){
      var name=new TextEncoder().encode(f.name),data=f.data,crc=crc32(data);
      var local=[0x50,0x4B,0x03,0x04,0x14,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00]
        .concat(u32le(crc)).concat(u32le(data.length)).concat(u32le(data.length))
        .concat(u16le(name.length)).concat([0x00,0x00]);
      var localArr=new Uint8Array(local.length+name.length+data.length);
      localArr.set(local);localArr.set(name,local.length);localArr.set(data,local.length+name.length);
      centralDir.push({name:name,crc:crc,size:data.length,offset:offset});
      parts.push(localArr);offset+=localArr.length;
    });
    var cdStart=offset,cdParts=[];
    centralDir.forEach(function(cd){
      var entry=[0x50,0x4B,0x01,0x02,0x14,0x00,0x14,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00]
        .concat(u32le(cd.crc)).concat(u32le(cd.size)).concat(u32le(cd.size))
        .concat(u16le(cd.name.length)).concat([0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00])
        .concat(u32le(cd.offset));
      var arr=new Uint8Array(entry.length+cd.name.length);
      arr.set(entry);arr.set(cd.name,entry.length);cdParts.push(arr);
    });
    var cdSize=cdParts.reduce(function(s,a){return s+a.length;},0);
    var eocd=[0x50,0x4B,0x05,0x06,0x00,0x00,0x00,0x00]
      .concat(u16le(files.length)).concat(u16le(files.length))
      .concat(u32le(cdSize)).concat(u32le(cdStart)).concat([0x00,0x00]);
    var total=parts.reduce(function(s,a){return s+a.length;},0)+cdSize+eocd.length;
    var result=new Uint8Array(total),pos=0;
    parts.forEach(function(a){result.set(a,pos);pos+=a.length;});
    cdParts.forEach(function(a){result.set(a,pos);pos+=a.length;});
    result.set(eocd,pos);
    return result;
  }

  var files=[
    {name:'[Content_Types].xml', data:strToU8(contentTypes)},
    {name:'_rels/.rels', data:strToU8(pkgRels)},
    {name:'xl/workbook.xml', data:strToU8(workbookXml)},
    {name:'xl/_rels/workbook.xml.rels', data:strToU8(relsXml)},
    {name:'xl/worksheets/sheet1.xml', data:strToU8(xml1)},
    {name:'xl/worksheets/sheet2.xml', data:strToU8(xml2)}
  ];
  var zip=makeZip(files);
  var blob=new Blob([zip],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;
  a.download='ND-Games-Shipments-'+sheetName+'-'+dateStr+'.xlsx';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(function(){URL.revokeObjectURL(url);},1000);
  showToast('\u2193 Excel \u0441\u043a\u0430\u0447\u0438\u0432\u0430\u0435\u0442\u0441\u044f');
}

var _reminderShown=false;
function checkReserveReminder(){
  // Only show once per session
  if(_reminderShown)return;
  var now=Date.now();
  var SIX_DAYS=6*24*60*60*1000;
  var SEVEN_DAYS=7*24*60*60*1000;
  var alerts=[];
  Object.values(S.games).forEach(function(g){
    if(g.status!=='reserved'&&g.status!=='reserved_exchange')return;
    // Use reservedAt if available, otherwise soldAt timestamp logic, else skip if addedAt is too recent
    // Only count if reservedAt is explicitly set - skip old reserves without it
    if(!g.reservedAt)return;
    var reservedAt=g.reservedAt;
    var since=now-reservedAt;
    if(since>=SIX_DAYS){
      var days=Math.floor(since/(24*60*60*1000));
      alerts.push({title:g.title||'—',person:g.person||'',phone:g.phone||'',days:days,id:g.id,isWeek:since>=SEVEN_DAYS});
    }
  });
  var banner=document.getElementById('reserve-reminder');
  var list=document.getElementById('reserve-reminder-list');
  if(!banner||!list)return;
  if(!alerts.length){banner.classList.remove('show');return;}
  alerts.sort(function(a,b){return b.days-a.days;});
  list.innerHTML=alerts.map(function(a){
    var label=a.isWeek
      ?'<span style="color:var(--red);font-weight:700">Свыше недели! ('+a.days+'д)</span>'
      :'<span style="color:var(--amber)">Завтра неделя (6д)</span>';
    var person=a.person?(' — '+a.person+(a.phone?' <a href="tel:'+a.phone+'" style="color:var(--accent)">'+a.phone+'</a>':'')):'';
    return '<div class="reserve-reminder-item">'
      +'<div><div style="font-weight:600">'+a.title+'</div>'
      +'<div style="font-size:11px;color:var(--text2)">'+person+'</div></div>'
      +label+'</div>';
  }).join('');
  banner.classList.add('show');
  _reminderShown=true;
}

function dismissReserveReminder(){
  var b=document.getElementById('reserve-reminder');
  if(b)b.classList.remove('show');
  _reminderShown=false;
}

function renderClients(){
  var page=document.getElementById('page-clients');
  if(!page||S.page!=='clients')return;
  var clients=Object.entries(S.clients||{}).map(function(e){return Object.assign({},e[1],{id:e[0]});}).sort(function(a,b){return (a.name||'').localeCompare(b.name||'','ru');});
  var html='<div style="display:flex;flex-direction:column;gap:10px">';
  html+='<button class="btn-new-ship" onclick="openAddClient()">+ Добавить клиента</button>';
  if(!clients.length){
    html+='<div style="text-align:center;padding:40px;color:var(--text3)">Клиентов пока нет</div>';
  } else {
    // Search
    html+='<div style="position:relative"><input type="text" id="client-search" placeholder="Поиск по имени..." oninput="filterClients()" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:9px 12px;font-size:14px;outline:none"></div>';
    html+='<div id="clients-list">';
    html+=buildClientsList(clients);
    html+='</div>';
  }
  html+='</div>';
  page.innerHTML=html;
}

function buildClientsList(clients){
  var html='';
  clients.forEach(function(c){
    var sales=Object.values(S.games).filter(function(g){return g.status==='sold'&&(g.person===c.name||(g.phone&&g.phone===c.phone));});
    var total=sales.reduce(function(s,g){return s+parseFloat(g.price||0);},0);
    html+='<div class="client-card">';
    html+='<div style="flex:1"><div class="client-name">'+c.name+'</div>';
    html+='<div class="client-meta">'+(c.phone?'📞 '+c.phone:'')+(c.note?' · '+c.note:'')+'</div>';
    if(sales.length)html+='<div class="client-meta" style="margin-top:4px">'+sales.length+' покупок · '+total.toFixed(0)+' ₾</div>';
    html+='<div class="client-actions">';
    html+='<button class="client-btn" onclick="openEditClient(\''+c.id+'\')">✏️ Редактировать</button>';
    html+='<button class="client-btn" style="color:var(--red)" onclick="deleteClient(\''+c.id+'\')">Удалить</button>';
    html+='</div></div>';
    if(c.discount)html+='<div class="client-discount">'+c.discount+'% скидка</div>';
    html+='</div>';
  });
  return html;
}

function filterClients(){
  var q=(document.getElementById('client-search')||{value:''}).value.toLowerCase();
  var clients=Object.entries(S.clients||{}).map(function(e){return Object.assign({},e[1],{id:e[0]});}).filter(function(c){
    return !q||(c.name||'').toLowerCase().includes(q)||(c.phone||'').includes(q);
  }).sort(function(a,b){return (a.name||'').localeCompare(b.name||'','ru');});
  var list=document.getElementById('clients-list');
  if(list)list.innerHTML=buildClientsList(clients);
}

function openAddClient(){
  document.getElementById('modal-root').innerHTML=
    '<div class="modal-overlay" onclick="closeModal(event)"><div class="modal" onclick="event.stopPropagation()">'
    +'<div class="modal-handle"></div>'
    +'<div class="modal-title">Новый клиент <button class="btn-close" onclick="closeModalForce()">×</button></div>'
    +'<div class="field"><label>Имя</label><input id="cl-name" type="text" placeholder="Имя клиента"></div>'
    +'<div class="field"><label>Телефон</label><input id="cl-phone" type="tel" placeholder="+995..."></div>'
    +'<div class="field"><label>Скидка (%)</label><input id="cl-discount" type="number" placeholder="0" min="0" max="100"></div>'
    +'<div class="field"><label>Заметка</label><input id="cl-note" type="text" placeholder="VIP, постоянный..."></div>'
    +'<button class="btn-primary" onclick="saveClient()">Сохранить</button>'
    +'</div></div>';
}

function openEditClient(id){
  var c=S.clients[id];if(!c)return;
  document.getElementById('modal-root').innerHTML=
    '<div class="modal-overlay" onclick="closeModal(event)"><div class="modal" onclick="event.stopPropagation()">'
    +'<div class="modal-handle"></div>'
    +'<div class="modal-title">Редактировать клиента <button class="btn-close" onclick="closeModalForce()">×</button></div>'
    +'<div class="field"><label>Имя</label><input id="cl-name" type="text" value="'+(c.name||'')+'"></div>'
    +'<div class="field"><label>Телефон</label><input id="cl-phone" type="tel" value="'+(c.phone||'')+'"></div>'
    +'<div class="field"><label>Скидка (%)</label><input id="cl-discount" type="number" value="'+(c.discount||0)+'" min="0" max="100"></div>'
    +'<div class="field"><label>Заметка</label><input id="cl-note" type="text" value="'+(c.note||'')+'"></div>'
    +'<button class="btn-primary" onclick="saveClient(\''+id+'\')">Сохранить</button>'
    +'<button class="btn-danger" onclick="deleteClient(\''+id+'\')">Удалить клиента</button>'
    +'</div></div>';
}

function saveClient(id){
  var name=document.getElementById('cl-name').value.trim();
  if(!name){showToast('Введите имя');return;}
  var data={name:name,phone:document.getElementById('cl-phone').value.trim(),discount:parseFloat(document.getElementById('cl-discount').value)||0,note:document.getElementById('cl-note').value.trim()};
  var cid=id||uid();
  data.id=cid;
  db.ref('clients/'+cid).set(data);
  showToast('Клиент сохранён');closeModalForce();
}

function deleteClient(id){
  if(!confirm('Удалить клиента?'))return;
  db.ref('clients/'+id).remove();
  showToast('Удалено');closeModalForce();
}

// Pick client from dropdown in reserve form
function pickClient(name, phone, discount){
  var ni=document.getElementById('inp-person');if(ni)ni.value=name;
  var pi=document.getElementById('inp-phone');if(pi)pi.value=phone||'';
  // Apply discount to price
  if(discount>0){
    var priceInp=document.getElementById('inp-price');
    if(priceInp&&priceInp.value){
      var orig=parseFloat(priceInp.value)||0;
      var discounted=Math.round(orig*(1-discount/100));
      priceInp.value=discounted;
      showToast('Скидка '+discount+'%: '+discounted+' ₾');
    }
  }
  // Close dropdown
  var dd=document.getElementById('client-dropdown');if(dd)dd.remove();
}

function onPersonInput(val){
  var dd=document.getElementById('client-dropdown');if(dd)dd.remove();
  if(!val||val.length<1)return;
  var matches=Object.values(S.clients||{}).filter(function(c){
    return (c.name||'').toLowerCase().includes(val.toLowerCase())||(c.phone||'').includes(val);
  }).slice(0,6);
  if(!matches.length)return;
  var wrap=document.getElementById('inp-person').parentNode;
  var ddEl=document.createElement('div');
  ddEl.id='client-dropdown';
  ddEl.className='client-list-dropdown';
  ddEl.innerHTML=matches.map(function(c){
    var disc=c.discount>0?(' <span style="color:var(--accent);font-size:10px">-'+c.discount+'%</span>'):'';
    return '<div class="client-list-item" onclick="pickClient(\''+c.name.replace(/'/g,"\\'")+'\',\''+(c.phone||'').replace(/'/g,"\\'")+'\','+( c.discount||0)+')">'
      +'<div><div style="font-size:13px;font-weight:600">'+c.name+disc+'</div>'
      +'<div style="font-size:11px;color:var(--text2)">'+(c.phone||'')+'</div></div>'
      +'</div>';
  }).join('');
  wrap.style.position='relative';
  wrap.appendChild(ddEl);
}

function renderWishlist(){
  var page=document.getElementById('page-wishlist');
  if(!page||S.page!=='wishlist')return;
  var items=Object.entries(S.wishlist||{}).map(function(e){return Object.assign({},e[1],{id:e[0]});}).sort(function(a,b){return (b.addedAt||0)-(a.addedAt||0);});
  var inStock=0;
  items.forEach(function(w){
    var found=Object.values(S.games).some(function(g){return g.status==='available'&&(g.title||'').toLowerCase().includes((w.title||'').toLowerCase());});
    if(found)inStock++;
  });
  var html='<div style="display:flex;flex-direction:column;gap:10px">';
  html+='<button class="btn-new-ship" onclick="openAddWish()">+ Добавить в вишлист</button>';

  if(!items.length){
    html+='<div style="text-align:center;padding:40px;color:var(--text3)">Вишлист пуст</div>';
  } else {
    items.forEach(function(w){
      var inStock=Object.values(S.games).some(function(g){return g.status==='available'&&(g.title||'').toLowerCase().includes((w.title||'').toLowerCase());});
      html+='<div class="wish-card">';
      html+=w.cover?'<img class="wish-cover" src="'+w.cover+'" alt="">':'<div class="wish-cover"></div>';
      html+='<div class="wish-info"><div class="wish-title">'+w.title+'</div>';
      html+='<div class="wish-meta">'+(w.platform||'')+(w.note?' · '+w.note:'')+'</div>';
      if(inStock)html+='<div style="font-size:11px;color:var(--green);font-weight:700;margin-top:3px">✓ Есть в наличии!</div>';
      html+='</div>';
      html+='<div class="wish-actions">';
      if(inStock)html+='<button class="wish-btn found" onclick="setPage(\'available\')">Показать</button>';
      html+='<button class="wish-btn" onclick="deleteWish(\''+w.id+'\')">✕</button>';
      html+='</div></div>';

  }
  html+='</div>';
  page.innerHTML=html;
}

var wishTimer=null;
function onWishInput(val){
  clearTimeout(wishTimer);
  var box=document.getElementById('wish-sugg');if(box)box.innerHTML='';
  if(!val||val.length<2)return;
  wishTimer=setTimeout(function(){fetchWishSugg(val);},600);
}
async function fetchWishSugg(q){
  try{
    var results=await searchIGDB(q,5);
    results=results;
    var box=document.getElementById('wish-sugg');if(!box)return;
    if(!results.length){box.innerHTML='';return;}
    var html='<div class="suggest-list">';
    results.forEach(function(g){
      var sn=g.name.replace(/&/g,'&amp;').replace(/"/g,'&quot;');
      var sc=(g.background_image||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;');
      html+='<div class="suggest-item" onclick="selectWishSugg(&quot;'+sn+'&quot;,&quot;'+sc+'&quot;)">';
      html+=g.background_image?'<img class="sug-thumb" src="'+g.background_image+'" alt="">':'<div class="sug-thumb"></div>';
      html+='<div><div class="sug-name">'+g.name+'</div></div></div>';
    });
    html+='</div>';
    box.innerHTML=html;
  }catch(e){var box=document.getElementById('wish-sugg');if(box)box.innerHTML='';}
}
function selectWishSugg(name,cover){
  var ti=document.getElementById('wish-title');if(ti)ti.value=name;
  var ci=document.getElementById('wish-cover');if(ci)ci.value=cover;
  var tw=document.getElementById('wish-thumb-wrap');
  if(tw)tw.innerHTML=cover?'<img src="'+cover+'" style="width:40px;height:56px;object-fit:cover;border-radius:5px;margin-top:4px">':'';
  var box=document.getElementById('wish-sugg');if(box)box.innerHTML='';
}
function saveWish(){
  var title=document.getElementById('wish-title').value.trim();
  if(!title){showToast('Введите название');return;}
  var id=uid();
  db.ref('wishlist/'+id).set({id:id,title:title,cover:document.getElementById('wish-cover').value||'',platform:document.getElementById('wish-plat').value,note:document.getElementById('wish-note').value.trim(),addedAt:Date.now()});
  showToast('Добавлено в вишлист');closeModalForce();
}
function deleteWish(id){
  db.ref('wishlist/'+id).remove();
}

function renderGameStats(){
  var page=document.getElementById('page-gamestats');
  if(!page||S.page!=='gamestats')return;
  var games=Object.values(S.games);
  // Build stats per title
  var stats={};
  games.forEach(function(g){
    var key=(g.title||'').toLowerCase().trim();
    if(!key)return;
    if(!stats[key])stats[key]={title:g.title,cover:g.cover||'',sold:0,inStock:0,inTransit:0,revenue:0,prices:[],avgDays:0,daysArr:[]};
    var s=stats[key];
    if(g.status==='sold'){
      s.sold++;
      var price=parseFloat(g.price||0);
      if(price>0){s.revenue+=price;s.prices.push(price);}
      if(g.addedAt&&g.soldAt){s.daysArr.push(Math.round((g.soldAt-g.addedAt)/(86400000)));}
    }
    if(g.status==='available')s.inStock++;
    if(g.status==='transit'||g.status==='ordered')s.inTransit++;
  });
  // Compute averages
  Object.values(stats).forEach(function(s){
    s.avgPrice=s.prices.length?Math.round(s.prices.reduce(function(a,b){return a+b;},0)/s.prices.length):0;
    s.avgDays=s.daysArr.length?Math.round(s.daysArr.reduce(function(a,b){return a+b;},0)/s.daysArr.length):null;
  });
  // Sort by sold desc
  var sorted=Object.values(stats).filter(function(s){return s.sold>0||s.inStock>0;}).sort(function(a,b){return b.sold-a.sold||b.inStock-a.inStock;});

  var html='<div style="display:flex;flex-direction:column;gap:8px">';
  html+='<div style="font-size:12px;color:var(--text2);margin-bottom:4px">Топ игр по количеству продаж</div>';
  if(!sorted.length){
    html+='<div style="text-align:center;padding:40px;color:var(--text3)">Данных пока нет</div>';
  } else {
    sorted.forEach(function(s,i){
      html+='<div class="gstat-card">';
      html+='<div style="font-size:16px;font-weight:800;color:var(--text3);min-width:24px;text-align:center">'+(i+1)+'</div>';
      html+=s.cover?'<img class="gstat-cover" src="'+s.cover+'" alt="">':'<div class="gstat-cover"></div>';
      html+='<div class="gstat-info"><div class="gstat-title">'+s.title+'</div>';
      html+='<div class="gstat-nums">';
      if(s.sold)html+='<span class="gstat-num" style="color:var(--green)">✓ '+s.sold+' продано</span>';
      if(s.inStock)html+='<span class="gstat-num" style="color:var(--accent)">'+s.inStock+' в наличии</span>';
      if(s.inTransit)html+='<span class="gstat-num" style="color:var(--blue)">'+s.inTransit+' в пути</span>';
      if(s.avgPrice)html+='<span class="gstat-num">~'+s.avgPrice+' ₾</span>';
      if(s.avgDays!==null)html+='<span class="gstat-num">~'+s.avgDays+' дн</span>';
      if(s.revenue)html+='<span class="gstat-num" style="color:var(--amber)">'+s.revenue.toFixed(0)+' ₾</span>';
      html+='</div></div></div>';
    });
  }
  html+='</div>';
  page.innerHTML=html;
}

function renderOrders(){
  var page=document.getElementById('page-orders');
  if(!page||S.page!=='orders')return;
  var orders=Object.values(S.orders||{}).sort(function(a,b){return (b.createdAt||0)-(a.createdAt||0);});
  var statusLabels={new:'Новый',confirmed:'Подтверждён',delivered:'Доставлен',cancelled:'Отменён'};
  var deliveryLabels={pickup:'Самовывоз',shipping:'Маршрутка'};
  if(!orders.length){
    page.innerHTML='<div style="text-align:center;padding:60px;color:var(--text3);font-size:14px">Заказов пока нет</div>';
    return;
  }
  var counts={new:0,confirmed:0,delivered:0,cancelled:0};
  orders.forEach(function(o){counts[o.status]=(counts[o.status]||0)+1;});
  var html='<div style="display:flex;flex-direction:column;gap:10px">';
  html+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:8px">';
  [{k:'new',l:'Новые',c:'#00d4ff'},{k:'confirmed',l:'Подтв.',c:'#00ff88'},{k:'delivered',l:'Дост.',c:'#888'},{k:'cancelled',l:'Отм.',c:'#f06060'}].forEach(function(s){
    html+='<div style="background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center"><div style="font-size:20px;font-weight:700;color:'+s.c+'">'+(counts[s.k]||0)+'</div><div style="font-size:10px;color:var(--text3)">'+s.l+'</div></div>';
  });
  html+='</div>';
  orders.forEach(function(o){
    var dateStr=o.createdAt?new Date(o.createdAt).toLocaleString('ru-RU'):'';
    var items=o.items||[];
    html+='<div class="order-card'+(o.status==='new'?' new-order':'')+'">';
    html+='<div class="order-head"><div><div style="font-size:14px;font-weight:700">'+(o.name||'—')+'</div>';
    html+='<div style="font-size:12px;color:var(--text2)">'+(o.phone?'<a href="tel:'+o.phone+'" style="color:var(--accent,#7c6df0);text-decoration:none">'+o.phone+'</a>':'')+(o.city?' · '+o.city:'')+'</div></div>';
    html+='<div style="text-align:right"><span class="order-status '+(o.status||'new')+'">'+(statusLabels[o.status]||o.status)+'</span><div style="font-size:10px;color:var(--text3);margin-top:2px">'+dateStr+'</div></div></div>';
    if(o.delivery||o.comment)html+='<div style="font-size:11px;color:var(--text2);margin-bottom:6px">'+(deliveryLabels[o.delivery]||o.delivery||'')+(o.comment?' · "'+o.comment+'"':'')+'</div>';
    html+='<div class="order-items">';
    items.forEach(function(it){html+='<div class="order-item-row"><span>'+it.title+' ('+(it.platform||'')+')</span><span>'+(it.price||0)+' ₾</span></div>';});
    html+='<div class="order-item-row"><span>Итого</span><span>'+(o.total||0)+' ₾</span></div>';
    html+='</div>';
    html+='<div class="order-actions">';
    if(o.status==='new'){
      html+='<button class="order-action-btn confirm" data-action="confirm" data-oid="'+o.id+'">✓ Подтвердить</button>';
      html+='<button class="order-action-btn cancel" data-action="cancel" data-oid="'+o.id+'">Отменить</button>';
    }
    if(o.status==='confirmed'){
      html+='<button class="order-action-btn deliver" data-action="deliver" data-oid="'+o.id+'">Доставлен</button>';
    }
    if(o.phone)html+='<a href="https://wa.me/'+o.phone.replace(/[^0-9]/g,'')+'" target="_blank" class="order-action-btn" style="text-decoration:none">&#x1F4AC; WhatsApp</a>';
    html+='</div></div>';
  });
  html+='</div>';
  page.innerHTML=html;
  page.onclick=function(e){
    var btn=e.target.closest('[data-action]');
    if(!btn)return;
    var action=btn.dataset.action,oid=btn.dataset.oid;
    if(action==='confirm')updateOrderStatus(oid,'confirmed');
    if(action==='cancel')updateOrderStatus(oid,'cancelled');
    if(action==='deliver')markOrderDelivered(oid);
  };
}

function updateOrderStatus(id,status){
  db.ref('orders/'+id).update({status:status});
  showToast('Статус обновлён');
}

function markOrderDelivered(orderId){
  var order=S.orders[orderId];if(!order)return;
  db.ref('orders/'+orderId).update({status:'delivered',deliveredAt:Date.now()});
  var items=order.items||[];
  items.forEach(function(it){
    if(it.id&&S.games[it.id]){
      db.ref('games/'+it.id).update({status:'sold',soldAt:Date.now(),price:it.price,person:order.name,phone:order.phone});
      var eid=uid();
      db.ref('expenses/'+eid).set({id:eid,name:it.title,to:order.name,amount:-(it.price||0),date:Date.now(),type:'sale_income'});
    }
  });
  showToast('Доставлено! Игры переведены в Продано');
}

function renderLoyalty(){
  var page=document.getElementById('page-loyalty');
  if(!page||S.page!=='loyalty')return;
  db.ref('loyalty').once('value').then(function(snap){
    var users=[];
    snap.forEach(function(ch){users.push(ch.val());});
    users.sort(function(a,b){return (b.totalSpent||0)-(a.totalSpent||0);});

    if(!users.length){
      page.innerHTML='<div style="text-align:center;padding:60px;color:var(--text3)">No registered users yet</div>';
      return;
    }

    var totalRevenue=users.reduce(function(s,u){return s+(u.totalSpent||0);},0);
    var html='<div style="display:flex;flex-direction:column;gap:8px">';

    // Stats bar
    html+='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px">';
    html+='<div style="background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center"><div style="font-size:22px;font-weight:700;color:var(--accent)">'+users.length+'</div><div style="font-size:10px;color:var(--text3)">Клиентов</div></div>';
    html+='<div style="background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center"><div style="font-size:22px;font-weight:700;color:var(--green)">'+totalRevenue.toFixed(0)+' ₾</div><div style="font-size:10px;color:var(--text3)">Общая сумма</div></div>';
    html+='<div style="background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center"><div style="font-size:22px;font-weight:700;color:var(--amber)">'+users.filter(function(u){return (u.discountPct||0)>0;}).length+'</div><div style="font-size:10px;color:var(--text3)">Со скидкой</div></div>';
    html+='</div>';

    users.forEach(function(u){
      var initials=(u.name||u.email||'U').charAt(0).toUpperCase();
      var pct=u.discountPct||0;
      var pctClass='p'+pct;
      var levelLabel=pct===0?'Starter':pct===3?'Bronze':pct===5?'Silver':pct===7?'Gold':'Platinum';
      html+='<div class="loyalty-row">';
      html+='<div class="loyalty-avatar">'+initials+'</div>';
      html+='<div class="loyalty-info"><div class="loyalty-name">'+(u.name||'—')+'</div><div class="loyalty-email">'+(u.email||'')+'</div></div>';
      html+='<div class="loyalty-stats">';
      html+='<div class="loyalty-stat"><div class="loyalty-stat-val">'+(u.totalSpent||0).toFixed(0)+' ₾</div><div class="loyalty-stat-label">ПОТРАЧЕНО</div></div>';
      html+='<div class="loyalty-pct-badge '+pctClass+'">'+pct+'% '+levelLabel+'</div>';
      html+='</div>';
      html+='<div class="loyalty-actions">';
      html+='<button class="loyalty-action-btn" data-uid="'+u.uid+'" data-action="edit">⚙️</button>';
      html+='</div>';
      html+='</div>';
    });
    html+='</div>';
    page.innerHTML=html;

    // Event delegation
    page.onclick=function(e){
      var btn=e.target.closest('[data-action]');
      if(!btn)return;
      var uid=btn.dataset.uid;
      if(btn.dataset.action==='edit')openLoyaltyEdit(uid);
    };
  });
}

function openLoyaltyEdit(uid){
  db.ref('loyalty/'+uid).once('value').then(function(snap){
    var u=snap.val();if(!u)return;
    document.getElementById('modal-root').innerHTML=
      '<div class="modal-overlay" onclick="closeModal(event)"><div class="modal" onclick="event.stopPropagation()">'
      +'<div class="modal-handle"></div>'
      +'<div class="modal-title">Скидка: '+(u.name||u.email||'')+' <button class="btn-close" onclick="closeModalForce()">×</button></div>'
      +'<div class="field"><label>Сумма покупок (₾)</label><input id="loy-spent" type="number" value="'+(u.totalSpent||0)+'"></div>'
      +'<div class="field"><label>Скидка (%)</label>'
      +'<select id="loy-pct"><option value="0"'+(u.discountPct===0?' selected':'')+'>0% — Starter</option><option value="3"'+(u.discountPct===3?' selected':'')+'>3% — Bronze</option><option value="5"'+(u.discountPct===5?' selected':'')+'>5% — Silver</option><option value="7"'+(u.discountPct===7?' selected':'')+'>7% — Gold</option><option value="10"'+(u.discountPct===10?' selected':'')+'>10% — Platinum</option></select></div>'
      +'<button class="btn-primary" data-uid="'+uid+'" onclick="saveLoyaltyEdit(this.dataset.uid)">Сохранить</button>'
      +'</div></div>';
  });

function saveLoyaltyEdit(uid){
  var spent=parseFloat(document.getElementById('loy-spent').value)||0;
  var pct=parseInt(document.getElementById('loy-pct').value)||0;
  var levelNames={0:'Starter',3:'Bronze',5:'Silver',7:'Gold',10:'Platinum'};
  db.ref('loyalty/'+uid).update({totalSpent:spent,discountPct:pct,level:levelNames[pct]||'Starter'});
  showToast('Сохранено');
  closeModalForce();
  setTimeout(renderLoyalty,300);
}
